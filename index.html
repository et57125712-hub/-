<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#090014">
<title>IMMUNE//RUNNER 50</title>
<style>
:root{
  --bg:#07000f;--panel:#12021f;--panel2:#19032a;--cyan:#35f2ff;--pink:#ff3bd4;
  --lime:#9cff57;--text:#f5f7ff;--muted:#a7a0bd;--danger:#ff486a;--gold:#ffd84d;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  margin:0;min-height:100vh;color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Microsoft JhengHei","Noto Sans TC",sans-serif;
  background:
    radial-gradient(circle at 15% 10%,rgba(255,59,212,.18),transparent 25%),
    radial-gradient(circle at 85% 20%,rgba(53,242,255,.16),transparent 26%),
    linear-gradient(180deg,#07000f,#0d0118 45%,#05000b);
  overflow-x:hidden;
}
body:before{
  content:"";position:fixed;inset:0;pointer-events:none;opacity:.22;
  background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(255,255,255,.04) 4px);
  mix-blend-mode:screen;z-index:20;
}
header{
  position:sticky;top:0;z-index:15;padding:16px 14px 12px;
  background:rgba(7,0,15,.88);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(53,242,255,.38);
  box-shadow:0 0 25px rgba(53,242,255,.15);
}
.brand{font-size:1.25rem;font-weight:1000;letter-spacing:.08em;text-shadow:0 0 12px var(--cyan),2px 0 var(--pink)}
.sub{font-size:.8rem;color:var(--muted);margin-top:4px}
main{max-width:760px;margin:auto;padding:12px 12px 108px}
.card{
  background:linear-gradient(180deg,rgba(25,3,42,.94),rgba(13,1,24,.96));
  border:1px solid rgba(53,242,255,.28);border-radius:20px;padding:15px;margin:12px 0;
  box-shadow:0 0 0 1px rgba(255,59,212,.08) inset,0 12px 35px rgba(0,0,0,.45);
}
.glow-title{font-weight:950;color:var(--cyan);text-shadow:0 0 12px rgba(53,242,255,.75);letter-spacing:.06em}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
button,select{
  width:100%;border-radius:13px;padding:12px 10px;font-size:1rem;font-weight:900;
}
select{background:#13051e;color:#fff;border:1px solid rgba(53,242,255,.35)}
button{
  border:1px solid var(--cyan);color:#001116;background:linear-gradient(90deg,var(--cyan),#aefcff);
  box-shadow:0 0 14px rgba(53,242,255,.25);cursor:pointer;touch-action:manipulation;
}
button.alt{background:linear-gradient(90deg,var(--pink),#ff9deb);border-color:var(--pink);color:#220018}
button.dark{background:#160724;color:#fff;border-color:#6f4c8d;box-shadow:none}
button.gold{background:linear-gradient(90deg,var(--gold),#fff0a6);border-color:var(--gold);color:#251800}
.meta{display:flex;justify-content:space-between;gap:8px;align-items:center;color:var(--muted);font-weight:800;font-size:.86rem}
.pill{border:1px solid rgba(255,59,212,.45);background:rgba(255,59,212,.08);padding:5px 9px;border-radius:999px;color:#ff9fea;white-space:nowrap}
.progress{height:9px;background:#1a0a25;border-radius:999px;overflow:hidden;margin-top:10px;border:1px solid rgba(53,242,255,.12)}
.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--pink),var(--cyan));box-shadow:0 0 12px var(--cyan)}
.question{
  margin-top:12px;padding:18px 16px;min-height:145px;border-radius:16px;
  background:linear-gradient(135deg,rgba(53,242,255,.07),rgba(255,59,212,.08));
  border-left:5px solid var(--cyan);font-size:1.22rem;line-height:1.55;font-weight:950;
  text-shadow:0 0 8px rgba(255,255,255,.08);
}
.options{display:grid;gap:10px;margin-top:12px}
.option{
  border:1px solid rgba(53,242,255,.34);border-radius:15px;padding:14px 13px;
  background:#10041b;color:#fff;font-weight:850;line-height:1.4;
  box-shadow:0 0 12px rgba(53,242,255,.06);touch-action:manipulation;
}
.option:active{transform:scale(.985)}
.option.correct{border-color:var(--lime);background:rgba(156,255,87,.14);box-shadow:0 0 16px rgba(156,255,87,.35)}
.option.wrong{border-color:var(--danger);background:rgba(255,72,106,.14);box-shadow:0 0 16px rgba(255,72,106,.28)}
.answer{display:none;margin-top:12px;padding:14px;border-radius:15px;background:rgba(255,216,77,.08);border:1px solid rgba(255,216,77,.4);line-height:1.65}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.team{padding:12px;border-radius:15px;background:#0f0418;border:1px solid rgba(255,59,212,.3);text-align:center}
.score{font-size:1.85rem;font-weight:1000;color:var(--cyan);text-shadow:0 0 10px rgba(53,242,255,.6)}
.team-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.team-btns button{padding:9px 4px;font-size:.84rem}
.bottom{
  position:fixed;left:0;right:0;bottom:0;z-index:16;padding:9px 10px calc(9px + env(safe-area-inset-bottom));
  background:rgba(7,0,15,.92);backdrop-filter:blur(12px);border-top:1px solid rgba(255,59,212,.35);
}
.bottom .bar{max-width:760px;margin:auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.hidden{display:none}
.status{margin-top:8px;color:var(--lime);font-weight:900;min-height:1.3em}
@media(min-width:700px){.grid2{grid-template-columns:1fr 1fr 1fr 1fr}.brand{font-size:1.5rem}.question{font-size:1.35rem}}
</style>
</head>
<body>
<header>
  <div class="brand">IMMUNE//RUNNER 50</div>
  <div class="sub">CYBER NURSING REVIEW SYSTEM · 期末考前概念闖關</div>
</header>

<main>
<section class="card">
  <div class="glow-title">MISSION SETUP</div>
  <div class="grid2" style="margin-top:10px">
    <select id="mode">
      <option value="choice">單人闖關</option>
      <option value="open">小組搶答</option>
    </select>
    <select id="category"><option value="全部">全域任務 50 題</option></select>
    <button id="startBtn">啟動任務</button>
    <button id="resetBtn" class="dark">系統重置</button>
  </div>
  <div class="progress"><span id="bar"></span></div>
  <div id="status" class="status"></div>
</section>

<section class="card">
  <div class="meta">
    <span id="progress">尚未啟動</span>
    <span id="catLabel" class="pill">全域任務</span>
  </div>
  <div id="question" class="question">點擊「啟動任務」，進入免疫系統防禦網。</div>
  <div id="options" class="options"></div>
  <div id="answer" class="answer"></div>
</section>

<section class="card" id="scoreCard">
  <div class="glow-title">SQUAD SCORE</div>
  <div class="score-grid" id="scorebox" style="margin-top:10px"></div>
</section>

<section class="card">
  <div class="glow-title">RULES</div>
  <p style="color:var(--muted);line-height:1.7;margin-bottom:0">
    單人闖關可直接點選答案；小組搶答則由老師揭曉答案。答對 +10，能說明原因再 +5。
  </p>
</section>
</main>

<div class="bottom">
  <div class="bar">
    <button id="answerBtn" class="gold">解鎖答案</button>
    <button id="nextBtn">下一關</button>
    <button id="scoreBtn" class="alt">隊伍計分</button>
  </div>
</div>

<script>

  cats.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;sel.appendChild(o);});
}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function setStatus(msg){document.getElementById("status").textContent=msg;}
function startGame(){
  const cat=document.getElementById("category").value;
  pool=questions.filter(x=>cat==="全部"||x.cat===cat);
  shuffle(pool);index=0;
  document.getElementById("catLabel").textContent=cat==="全部"?"全域任務":cat;
  setStatus("ACCESS GRANTED · 題庫已載入");
  nextQuestion();
}
function nextQuestion(){
  if(!pool.length){startGame();return;}
  if(index>=pool.length){
    document.getElementById("question").textContent="MISSION COMPLETE // 全部任務完成";
    document.getElementById("options").innerHTML="";
    document.getElementById("answer").style.display="none";
    document.getElementById("progress").textContent="完成";
    document.getElementById("bar").style.width="100%";
    setStatus("SYSTEM CLEAR · 防禦網建立完成");
    return;
  }
  current=pool[index++];
  document.getElementById("progress").textContent=`第 ${index} 關 / 共 ${pool.length} 關`;
  document.getElementById("bar").style.width=(index/pool.length*100)+"%";
  document.getElementById("question").textContent=current.q;
  document.getElementById("answer").style.display="none";
  document.getElementById("answer").innerHTML=`<b>正確答案：</b>${current.ans}<br><b>系統解析：</b>${current.exp}`;
  const box=document.getElementById("options");box.innerHTML="";
  if(document.getElementById("mode").value==="open"){
    box.innerHTML='<div style="color:var(--muted)">小組搶答模式：討論後舉牌，再按「解鎖答案」。</div>';
  }else{
    shuffle([...current.options]).forEach(opt=>{
      const el=document.createElement("button");
      el.type="button";el.className="option";el.textContent=opt;
      el.addEventListener("click",()=>choose(el,opt),{once:true});
      box.appendChild(el);
    });
  }
  window.scrollTo({top:0,behavior:"smooth"});
}
function choose(el,opt){
  document.querySelectorAll(".option").forEach(o=>o.disabled=true);
  if(opt===current.ans){el.classList.add("correct");setStatus("TARGET VERIFIED · 回答正確");}
  else{
    el.classList.add("wrong");setStatus("SYSTEM ALERT · 請查看解析");
    document.querySelectorAll(".option").forEach(o=>{if(o.textContent===current.ans)o.classList.add("correct");});
  }
  showAnswer();
}
function showAnswer(){if(current)document.getElementById("answer").style.display="block";}
function renderScores(){
  const box=document.getElementById("scorebox");box.innerHTML="";
  teams.forEach((s,i)=>{
    const d=document.createElement("div");d.className="team";
    d.innerHTML=`<b>SQUAD ${i+1}</b><div class="score">${s}</div>
      <div class="team-btns">
        <button type="button" data-i="${i}" data-d="10">+10</button>
        <button type="button" class="dark" data-i="${i}" data-d="5">+5</button>
        <button type="button" class="alt" data-i="${i}" data-d="-5">-5</button>
        <button type="button" class="dark" data-i="${i}" data-d="-10">-10</button>
      </div>`;
    box.appendChild(d);
  });
  box.querySelectorAll("button[data-i]").forEach(b=>b.addEventListener("click",()=>{teams[+b.dataset.i]+=+b.dataset.d;renderScores();}));
}
function resetGame(){
  teams=[0,0,0,0];pool=[];index=0;current=null;
  document.getElementById("question").textContent="點擊「啟動任務」，進入免疫系統防禦網。";
  document.getElementById("options").innerHTML="";
  document.getElementById("answer").style.display="none";
  document.getElementById("progress").textContent="尚未啟動";
  document.getElementById("catLabel").textContent="全域任務";
  document.getElementById("bar").style.width="0%";
  setStatus("SYSTEM RESET");
  renderScores();
}
document.getElementById("startBtn").addEventListener("click",startGame);
document.getElementById("resetBtn").addEventListener("click",resetGame);
document.getElementById("answerBtn").addEventListener("click",showAnswer);
document.getElementById("nextBtn").addEventListener("click",nextQuestion);
document.getElementById("scoreBtn").addEventListener("click",()=>document.getElementById("scoreCard").classList.toggle("hidden"));
setupCategories();renderScores();
</script>
</body>
</html>
