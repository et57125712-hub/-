<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#05000a"><title>免疫守衛戰</title><style>:root{--cyan:#35f2ff;--pink:#ff3bd4;--lime:#9cff57;--danger:#ff486a;--gold:#ffd84d;--text:#f7f7ff;--muted:#aaa0bd}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:linear-gradient(180deg,#05000a,#0d0118 60%,#030006);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Microsoft JhengHei",sans-serif}header{padding:15px 14px;background:#090012;border-bottom:1px solid rgba(53,242,255,.3);position:sticky;top:0;z-index:20}header h1{margin:0;font-size:1.2rem}header p{margin:4px 0 0;color:var(--muted);font-size:.82rem}main{max-width:760px;margin:auto;padding:12px 12px 104px}.card{background:#12021f;border:1px solid rgba(53,242,255,.22);border-radius:18px;padding:14px;margin:12px 0}.setup{display:grid;grid-template-columns:1fr 1fr;gap:8px}button,select{width:100%;border-radius:12px;padding:12px;font-size:1rem;font-weight:850}select{background:#180628;color:#fff;border:1px solid rgba(53,242,255,.3)}button{border:1px solid var(--cyan);background:linear-gradient(90deg,var(--cyan),#b4fbff);color:#001116}button.secondary{background:#1a0a25;color:#fff;border-color:#624379}.battle{position:relative;height:270px;overflow:hidden;border-radius:18px;background:linear-gradient(180deg,#82d7ff 0 54%,#b8e86d 55% 68%,#4d8b3b 69%);margin-top:10px;border:4px solid #f4f4f4;box-shadow:0 0 0 4px #1d1d28,0 14px 35px rgba(0,0,0,.45);transition:.5s}.battle.phase2{background:linear-gradient(180deg,#6d2d91 0 54%,#d65aa5 55% 68%,#2c1340 69%)}.battle.final{background:radial-gradient(circle at 50% 30%,#ff784f 0 15%,#3d0b21 45%,#07000f 80%)}.speedlines{position:absolute;inset:0;background:repeating-linear-gradient(165deg,transparent 0 14px,rgba(255,255,255,.22) 15px 17px,transparent 18px 32px);opacity:0;pointer-events:none}.speedlines.on{animation:speed .5s}@keyframes speed{0%{opacity:0;transform:translateX(-20px)}30%{opacity:.9}100%{opacity:0;transform:translateX(20px)}}.platform{position:absolute;width:150px;height:38px;border-radius:50%;background:radial-gradient(ellipse,#dff7b3 0 35%,#73a552 36% 70%,transparent 71%);bottom:25px}.platform.left{left:5px}.platform.right{right:5px}.hero,.monster{position:absolute;bottom:48px;font-size:78px;z-index:3}.hero{left:34px}.monster{right:34px;animation:float 1.7s ease-in-out infinite}.monster.evolved{font-size:94px;filter:drop-shadow(0 0 18px #ff486a)}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}.hero.throw{animation:throw .5s}.monster.hit{animation:monsterHit .45s}.hero.hit{animation:heroHit .45s}@keyframes throw{0%{transform:translateX(0)}40%{transform:translateX(16px) rotate(-8deg) scale(1.08)}100%{transform:translateX(0)}}@keyframes monsterHit{0%{transform:translateX(0)}35%{transform:translateX(22px) rotate(10deg)}65%{transform:translateX(-18px) rotate(-7deg)}100%{transform:translateX(0)}}@keyframes heroHit{0%{transform:translateX(0)}40%{transform:translateX(-18px) rotate(-8deg)}100%{transform:translateX(0)}}.statusbox{position:absolute;top:12px;background:#fff;color:#111;border:3px solid #222;border-radius:12px;padding:8px 10px;width:48%;font-weight:900;box-shadow:4px 4px 0 rgba(0,0,0,.25)}.statusbox.enemy{left:12px}.statusbox.heroBox{right:12px;top:auto;bottom:10px;width:44%}.nameRow{display:flex;justify-content:space-between;font-size:.86rem}.miniHp{height:12px;background:#3a3a3a;border-radius:999px;overflow:hidden;margin-top:6px}.miniHp span{display:block;height:100%;width:100%;background:linear-gradient(90deg,#7ddc55,#d6f24d);transition:width .35s}.battleText{position:absolute;left:12px;right:12px;bottom:78px;background:rgba(255,255,255,.94);color:#15151c;border:3px solid #222;border-radius:12px;padding:10px;font-weight:950;z-index:6;min-height:45px;transform:translateY(80px);opacity:0;transition:.25s}.battleText.show{transform:translateY(0);opacity:1}.syringe{position:absolute;left:100px;bottom:105px;font-size:38px;opacity:0;z-index:5}.syringe.on{animation:syringeFly .58s ease-out}@keyframes syringeFly{0%{opacity:0;transform:translateX(0) rotate(-20deg)}12%{opacity:1}85%{opacity:1}100%{opacity:0;transform:translateX(355px) translateY(-26px) rotate(25deg) scale(1.2)}}.damage{position:absolute;right:80px;top:100px;color:#fff;font-size:1.8rem;font-weight:1000;opacity:0;text-shadow:0 0 8px #000,0 0 16px var(--danger);z-index:7}.damage.on{animation:damage .7s}@keyframes damage{0%{opacity:0;transform:scale(.6)}25%{opacity:1;transform:scale(1.3)}100%{opacity:0;transform:translateY(-45px)}}.bossIntro{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,rgba(255,72,106,.4),rgba(5,0,10,.96));color:#fff;font-size:1.8rem;font-weight:1000;text-align:center;z-index:15;opacity:0;pointer-events:none}.bossIntro.show{animation:intro 1.2s}@keyframes intro{0%{opacity:0;transform:scale(.7)}25%{opacity:1;transform:scale(1.05)}75%{opacity:1}100%{opacity:0;transform:scale(1.15)}}.hud{display:flex;justify-content:space-between;margin-top:8px;color:var(--muted)}.hud b{color:var(--cyan)}.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:.86rem;font-weight:800}.question{margin-top:10px;padding:16px;border-radius:14px;background:#0f0418;border-left:4px solid var(--cyan);font-size:1.14rem;line-height:1.5;font-weight:850;min-height:120px}.options{display:grid;gap:9px;margin-top:10px}.option{background:#150621;color:#fff;border:1px solid rgba(53,242,255,.3);text-align:left}.option.correct{border-color:var(--lime);background:rgba(156,255,87,.12)}.option.wrong{border-color:var(--danger);background:rgba(255,72,106,.12)}.answer{display:none;margin-top:10px;padding:12px;border-radius:12px;background:#211408;border:1px solid rgba(255,216,77,.35);line-height:1.6}.source{margin-top:8px;padding-top:8px;border-top:1px dashed rgba(255,216,77,.35);font-size:.88rem;color:#ffe598}.status{min-height:1.2em;margin-top:8px;color:var(--lime);font-weight:850}.bottom{position:fixed;left:0;right:0;bottom:0;background:#090012;border-top:1px solid rgba(255,59,212,.3);padding:9px 10px calc(9px + env(safe-area-inset-bottom));z-index:30}.bottom .bar{max-width:760px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}@media(max-width:520px){.setup{grid-template-columns:1fr}.battle{height:250px}.hero,.monster{font-size:66px}.monster.evolved{font-size:82px}.statusbox{font-size:.8rem}.syringe{left:82px}@keyframes syringeFly{0%{opacity:0;transform:translateX(0) rotate(-20deg)}12%{opacity:1}85%{opacity:1}100%{opacity:0;transform:translateX(235px) translateY(-20px) rotate(25deg) scale(1.1)}}}</style></head><body><header><h1>免疫守衛戰</h1><p>國考特訓20題・概念闖關50題・綜合挑戰70題</p></header><main><section class="card"><div class="setup"><select id="gameMode"><option value="national">國考特訓（20題）</option><option value="concept">概念闖關（50題）</option><option value="all">綜合挑戰（70題）</option></select><button id="startBtn">開始戰鬥</button></div><div id="battle" class="battle"><div class="speedlines" id="speedlines"></div><div class="platform left"></div><div class="platform right"></div><div class="statusbox enemy"><div class="nameRow"><span id="bossName">免疫病毒</span><span>Lv.50</span></div><div class="miniHp"><span id="enemyHp"></span></div></div><div class="statusbox heroBox"><div class="nameRow"><span>護生守衛</span><span>Lv.<b id="heroLv">1</b></span></div><div class="miniHp"><span id="heroHpBar"></span></div></div><div id="hero" class="hero">🧑‍⚕️</div><div id="monster" class="monster">🦠</div><div id="syringe" class="syringe">💉</div><div id="damage" class="damage">-18</div><div id="battleText" class="battleText">野生的免疫病毒出現了！</div><div id="bossIntro" class="bossIntro">BOSS BATTLE<br><span style="font-size:1rem">免疫病毒現身</span></div></div><div class="hud"><span>生命 <b id="hp">5</b></span><span>連勝 <b id="streak">0</b></span><span>分數 <b id="sco
