<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#05000a">
<title>免疫守衛戰｜國考特訓版</title>
<style>
:root{--bg:#05000a;--panel:#12021f;--cyan:#35f2ff;--pink:#ff3bd4;--lime:#9cff57;--danger:#ff486a;--gold:#ffd84d;--text:#f7f7ff;--muted:#aaa0bd}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:radial-gradient(circle at 10% 10%,rgba(255,59,212,.18),transparent 24%),radial-gradient(circle at 90% 12%,rgba(53,242,255,.15),transparent 24%),linear-gradient(180deg,#05000a,#0d0118 60%,#030006);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Microsoft JhengHei","Noto Sans TC",sans-serif;overflow-x:hidden}
header{padding:15px 14px;background:rgba(9,0,18,.93);backdrop-filter:blur(10px);border-bottom:1px solid rgba(53,242,255,.3);position:sticky;top:0;z-index:20}
header h1{margin:0;font-size:1.2rem;letter-spacing:.04em;text-shadow:0 0 12px var(--cyan)}header p{margin:4px 0 0;color:var(--muted);font-size:.82rem}
main{max-width:760px;margin:auto;padding:12px 12px 104px}.card{background:linear-gradient(180deg,rgba(24,3,41,.95),rgba(11,1,20,.98));border:1px solid rgba(53,242,255,.22);border-radius:18px;padding:14px;margin:12px 0;box-shadow:0 15px 35px rgba(0,0,0,.38)}
.setup{display:grid;grid-template-columns:1fr 1fr;gap:8px}button,select{width:100%;border-radius:12px;padding:12px;font-size:1rem;font-weight:850;touch-action:manipulation}select{background:#180628;color:#fff;border:1px solid rgba(53,242,255,.3)}button{border:1px solid var(--cyan);background:linear-gradient(90deg,var(--cyan),#b4fbff);color:#001116}button.secondary{background:#1a0a25;color:#fff;border-color:#624379}
.battle{position:relative;height:250px;overflow:hidden;border-radius:16px;background:radial-gradient(circle at 50% 80%,rgba(53,242,255,.15),transparent 35%),linear-gradient(180deg,#130022,#06000c);margin-top:10px;border:1px solid rgba(255,59,212,.25)}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(53,242,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(53,242,255,.08) 1px,transparent 1px);background-size:28px 28px;transform:perspective(200px) rotateX(55deg) scale(1.4);transform-origin:bottom;opacity:.45}
.hero,.monster{position:absolute;bottom:30px;font-size:76px;transition:transform .2s,filter .2s}.hero{left:28px;filter:drop-shadow(0 0 14px rgba(53,242,255,.8))}.monster{right:30px;filter:drop-shadow(0 0 16px rgba(255,72,106,.8));animation:float 1.7s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.hero.attack{animation:attack .45s}.monster.hit{animation:monsterHit .45s}.hero.hit{animation:heroHit .45s}
@keyframes attack{0%{transform:translateX(0)}45%{transform:translateX(85px) scale(1.12)}100%{transform:translateX(0)}}@keyframes monsterHit{0%{transform:translateX(0)}35%{transform:translateX(18px) rotate(10deg)}65%{transform:translateX(-14px) rotate(-7deg)}100%{transform:translateX(0)}}@keyframes heroHit{0%{transform:translateX(0)}40%{transform:translateX(-18px) rotate(-8deg)}100%{transform:translateX(0)}}
.flash{position:absolute;inset:0;background:rgba(255,255,255,.45);opacity:0;pointer-events:none}.flash.on{animation:flash .35s}@keyframes flash{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
.beam{position:absolute;left:118px;right:120px;bottom:92px;height:8px;background:linear-gradient(90deg,transparent,var(--cyan),#fff,var(--pink),transparent);filter:drop-shadow(0 0 10px var(--cyan));transform:scaleX(0);transform-origin:left}.beam.on{animation:beam .42s}@keyframes beam{0%{transform:scaleX(0);opacity:0}25%{opacity:1}100%{transform:scaleX(1);opacity:0}}
.damage{position:absolute;right:78px;bottom:125px;color:var(--gold);font-size:1.6rem;font-weight:1000;opacity:0;text-shadow:0 0 12px var(--gold)}.damage.on{animation:damage .65s}@keyframes damage{0%{opacity:0;transform:translateY(10px) scale(.8)}25%{opacity:1;transform:translateY(0) scale(1.1)}100%{opacity:0;transform:translateY(-35px) scale(1)}}
.particles{position:absolute;inset:0;pointer-events:none}.particle{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px currentColor;animation:particle .6s forwards}@keyframes particle{to{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
.enemy-name{position:absolute;top:12px;left:14px;font-weight:950;color:#ff9aad}.hpbar{position:absolute;top:40px;left:14px;right:14px;height:18px;background:#220514;border-radius:999px;overflow:hidden;border:1px solid rgba(255,72,106,.45)}.hpbar span{display:block;height:100%;width:100%;background:linear-gradient(90deg,#ff486a,#ff9a3d);transition:width .35s,background .35s}
.phase{position:absolute;top:66px;left:14px;color:var(--muted);font-size:.8rem}.hud{display:flex;justify-content:space-between;margin-top:8px;color:var(--muted);font-size:.9rem}.hud b{color:var(--cyan)}
.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:.86rem;font-weight:800}.question{margin-top:10px;padding:16px;border-radius:14px;background:#0f0418;border-left:4px solid var(--cyan);font-size:1.14rem;line-height:1.5;font-weight:850;min-height:120px}.options{display:grid;gap:9px;margin-top:10px}.option{background:#150621;color:#fff;border:1px solid rgba(53,242,255,.3);text-align:left}.option.correct{border-color:var(--lime);background:rgba(156,255,87,.12)}.option.wrong{border-color:var(--danger);background:rgba(255,72,106,.12)}
.answer{display:none;margin-top:10px;padding:12px;border-radius:12px;background:#211408;border:1px solid rgba(255,216,77,.35);line-height:1.6}.source{margin-top:8px;padding-top:8px;border-top:1px dashed rgba(255,216,77,.35);font-size:.88rem;color:#ffe598}.status{min-height:1.2em;margin-top:8px;color:var(--lime);font-weight:850}.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(9,0,18,.94);backdrop-filter:blur(10px);border-top:1px solid rgba(255,59,212,.3);padding:9px 10px calc(9px + env(safe-area-inset-bottom));z-index:30}.bottom .bar{max-width:760px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.victory{display:none;position:fixed;inset:0;z-index:50;background:radial-gradient(circle,rgba(53,242,255,.18),rgba(5,0,10,.96));align-items:center;justify-content:center;text-align:center}.victory.show{display:flex}.victory-box{font-size:2rem;font-weight:1000;color:var(--gold);text-shadow:0 0 20px var(--gold);animation:victory 1s infinite alternate}@keyframes victory{from{transform:scale(.95)}to{transform:scale(1.05)}}
@media(max-width:520px){.setup{grid-template-columns:1fr}.battle{height:230px}.hero,.monster{font-size:68px}}
</style>
</head>
<body>
<div id="victory" class="victory"><div class="victory-box">BOSS DEFEATED<br><span style="font-size:1rem;color:#fff">免疫防線建立成功</span></div></div>
<header><h1>免疫守衛戰｜國考特訓版</h1><p>單人打怪・國考概念改寫・來源標註</p></header>
<main>
<section class="card"><div class="setup"><select id="category"><option value="全部">全部國考主題</option></select><button id="startBtn">開始戰鬥</button></div><div class="battle"><div class="grid"></div><div class="enemy-name">IMMUNO VIRUS BOSS</div><div class="hpbar"><span id="enemyHp"></span></div><div id="phase" class="phase">Phase 1</div><div id="hero" class="hero">🧑‍⚕️</div><div id="monster" class="monster">🦠</div><div id="beam" class="beam"></div><div id="damage" class="damage">-18</div><div id="particles" class="particles"></div><div id="flash" class="flash"></div></div><div class="hud"><span>生命 <b id="hp">5</b></span><span>連勝 <b id="streak">0</b></span><span>分數 <b id="score">0</b></span></div><div id="status" class="status"></div></section>
<section class="card"><div class="meta"><span id="progress">尚未開始</span><span id="catLabel">全部國考主題</span></div><div id="question" class="question">按下「開始戰鬥」。</div><div id="options" class="options"></div><div id="answer" class="answer"></div></section>
</main>
<div class="bottom"><div class="bar"><button id="answerBtn" class="secondary">查看解析</button><button id="nextBtn">下一題</button></div></div>
<script>
const questions=[
{cat:'112年第2次',q:'一名病人接觸過敏原後，短時間內出現廣泛血管擴張與血壓下降。這種反應最符合哪一種變化？',options:['小動脈擴張','微血管通透性下降','心輸出量必定上升','嗜酸性球大量釋放組織胺'],ans:'小動脈擴張',exp:'過敏性休克可造成全身性血管擴張與通透性增加，進而導致低血壓。',src:'112年第2次護理師國考－基礎醫學，第16題；本題已重新改寫。'},
{cat:'112年第2次',q:'重症肌無力最直接涉及哪一種神經肌肉接點傳導物質的異常？',options:['乙醯膽鹼（acetylcholine）','血清素（serotonin）','組織胺（histamine）','腎上腺素（epinephrine）'],ans:'乙醯膽鹼（acetylcholine）',exp:'重症肌無力的核心與乙醯膽鹼受體相關自體抗體有關。',src:'112年第2次護理師國考－基礎醫學，第12題；本題已重新改寫。'},
{cat:'112年第3次',q:'細胞膜外側的 glycocalyx 對免疫系統最重要的功能為何？',options:['細胞辨識與環境互動','穩定細胞核','形成緊密接合','製造ATP'],ans:'細胞辨識與環境互動',exp:'glycocalyx 參與細胞辨識、黏附與環境互動。',src:'112年第3次護理師國考－基礎醫學，第11題；本題已重新改寫。'},
{cat:'114年第2次',q:'血液中的單核球進入組織後，最可能分化為哪一種細胞？',options:['巨噬細胞（macrophage）','嗜酸性球','嗜鹼性球','淋巴球'],ans:'巨噬細胞（macrophage）',exp:'單核球進入組織後可分化為巨噬細胞。',src:'114年第2次護理師國考－基礎醫學，第5題；本題已重新改寫。'},
{cat:'114年第3次',q:'下列何者不屬於淋巴器官？',options:['松果腺（pineal gland）','胸腺（thymus）','脾臟（spleen）','扁桃腺（tonsil）'],ans:'松果腺（pineal gland）',exp:'胸腺、脾臟與扁桃腺皆屬淋巴器官；松果腺屬內分泌器官。',src:'114年第3次護理師國考－基礎醫學，第5題；本題已重新改寫。'},
{cat:'免疫專有名詞',q:'樹突細胞將外源性抗原片段呈現給 CD4⁺ T 細胞時，主要透過哪一類分子？',options:['MHC class II','MHC class I','IgG','C3b'],ans:'MHC class II',exp:'外源性抗原通常由 MHC class II 呈現給 CD4⁺ T 細胞。',src:'依近年護理師國考 MHC 與抗原呈現概念改寫。'},
{cat:'免疫專有名詞',q:'病毒感染細胞將內源性抗原呈現給 CD8⁺ T 細胞時，主要透過哪一類分子？',options:['MHC class I','MHC class II','IgA','C5a'],ans:'MHC class I',exp:'內源性抗原通常由 MHC class I 呈現給 CD8⁺ T 細胞。',src:'依近年護理師國考 MHC 與細胞性免疫概念改寫。'},
{cat:'免疫專有名詞',q:'哪一類細胞可大量分泌抗體？',options:['漿細胞（plasma cell）','自然殺手細胞','嗜中性球','調節型T細胞'],ans:'漿細胞（plasma cell）',exp:'B 細胞活化後可分化為漿細胞並大量分泌抗體。',src:'依近年護理師國考 B 細胞與抗體概念改寫。'},
{cat:'免疫專有名詞',q:'補體系統末端形成可破壞細胞膜的構造稱為？',options:['膜攻擊複合體（MAC）','免疫突觸','抗原受體','發炎小體'],ans:'膜攻擊複合體（MAC）',exp:'C5b-C9 可形成膜攻擊複合體，造成目標細胞膜破壞。',src:'依近年護理師國考補體概念改寫。'},
{cat:'免疫專有名詞',q:'第一型過敏反應最典型的免疫球蛋白為何？',options:['IgE','IgG','IgM','IgD'],ans:'IgE',exp:'IgE 與肥大細胞結合，是立即型過敏反應的重要機轉。',src:'依近年護理師國考過敏反應概念改寫。'},
{cat:'免疫專有名詞',q:'黏膜分泌液中最具代表性的免疫球蛋白為何？',options:['IgA','IgM','IgE','IgD'],ans:'IgA',exp:'分泌型 IgA 是黏膜免疫的重要抗體。',src:'依近年護理師國考免疫球蛋白概念改寫。'},
{cat:'免疫專有名詞',q:'下列何者最能促進巨噬細胞活化？',options:['TH1 細胞','TH2 細胞','紅血球','血小板'],ans:'TH1 細胞',exp:'TH1 細胞可分泌 IFN-γ 等細胞激素，促進巨噬細胞活化。',src:'依近年護理師國考 T 細胞亞群概念改寫。'},
{cat:'免疫專有名詞',q:'哪一類 T 細胞主要負責抑制過度免疫反應並維持自體耐受？',options:['調節型T細胞（Treg）','TH17','CD8⁺ T細胞','自然殺手細胞'],ans:'調節型T細胞（Treg）',exp:'Treg 可抑制過度免疫反應並維持自體耐受。',src:'依近年護理師國考免疫調節概念改寫。'},
{cat:'臨床情境',q:'病人輸入不相容紅血球後，抗體攻擊紅血球表面抗原。這最符合哪一型過敏反應？',options:['第二型','第一型','第三型','第四型'],ans:'第二型',exp:'第二型過敏反應常由抗體攻擊細胞表面抗原。',src:'依近年護理師國考過敏反應與輸血概念改寫。'},
{cat:'臨床情境',q:'免疫複合物沉積於組織並活化補體，最符合哪一型過敏反應？',options:['第三型','第一型','第二型','第四型'],ans:'第三型',exp:'第三型過敏反應的核心是免疫複合物沉積。',src:'依近年護理師國考免疫複合物概念改寫。'},
{cat:'臨床情境',q:'接觸性皮膚炎主要由致敏 T 細胞媒介，屬於哪一型過敏反應？',options:['第四型','第一型','第二型','第三型'],ans:'第四型',exp:'第四型過敏反應由 T 細胞媒介，反應較延遲。',src:'依近年護理師國考過敏反應概念改寫。'},
{cat:'臨床情境',q:'HIV 感染最主要破壞哪一類免疫細胞？',options:['CD4⁺ T細胞','CD8⁺ T細胞','B細胞','嗜中性球'],ans:'CD4⁺ T細胞',exp:'HIV 主要感染並破壞 CD4⁺ T 細胞。',src:'依近年護理師國考免疫缺乏概念改寫。'},
{cat:'臨床情境',q:'器官移植後，受贈者免疫系統辨識移植物細胞表面差異，最重要的分子為何？',options:['MHC 分子','IgA','IL-10','CRP'],ans:'MHC 分子',exp:'MHC 差異是移植排斥的重要基礎。',src:'依近年護理師國考移植免疫概念改寫。'},
{cat:'臨床情境',q:'自然殺手細胞較容易攻擊哪一類目標？',options:['MHC class I 表現降低的異常細胞','正常紅血球','成熟血小板','正常骨骼肌'],ans:'MHC class I 表現降低的異常細胞',exp:'NK 細胞會注意 MHC class I 表現降低的異常細胞。',src:'依近年護理師國考腫瘤免疫概念改寫。'},
{cat:'臨床情境',q:'全身性紅斑狼瘡常見的免疫傷害機轉，最接近下列何者？',options:['免疫複合物沉積','單純皮膚屏障破壞','紅血球運氧不足','凝血因子缺乏'],ans:'免疫複合物沉積',exp:'SLE 常涉及自體抗體與免疫複合物沉積。',src:'依近年護理師國考自體免疫概念改寫。'}];
let pool=[],index=0,current=null,hp=5,streak=0,score=0,enemyHp=100;const $=id=>document.getElementById(id);
function setupCategories(){[...new Set(questions.map(q=>q.cat))].forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;$('category').appendChild(o)})}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function update(){hp=Math.max(0,hp);$('hp').textContent=hp;$('streak').textContent=streak;$('score').textContent=score;$('enemyHp').style.width=enemyHp+'%';$('enemyHp').style.background=enemyHp>60?'linear-gradient(90deg,#ff486a,#ff9a3d)':enemyHp>30?'linear-gradient(90deg,#ff9a3d,#ffd84d)':'linear-gradient(90deg,#ffd84d,#9cff57)';$('phase').textContent=enemyHp>66?'Phase 1':enemyHp>33?'Phase 2':'Final Phase'}
function spawnParticles(){const box=$('particles');for(let i=0;i<18;i++){const p=document.createElement('span');p.className='particle';p.style.left='78%';p.style.top='55%';p.style.color=i%2?'var(--pink)':'var(--cyan)';p.style.setProperty('--dx',(Math.random()*160-80)+'px');p.style.setProperty('--dy',(Math.random()*140-90)+'px');box.appendChild(p);setTimeout(()=>p.remove(),650)}}
function animateHit(ok,damage=0){if(ok){$('hero').classList.add('attack');$('monster').classList.add('hit');$('beam').classList.add('on');$('damage').textContent='-'+damage;$('damage').classList.add('on');spawnParticles()}else{$('monster').classList.add('attack');$('hero').classList.add('hit')}$('flash').classList.add('on');setTimeout(()=>{$('hero').classList.remove('attack','hit');$('monster').classList.remove('attack','hit');$('beam').classList.remove('on');$('damage').classList.remove('on');$('flash').classList.remove('on')},520)}
function startGame(){const cat=$('category').value;pool=questions.filter(q=>cat==='全部'||q.cat===cat);shuffle(pool);index=0;hp=5;streak=0;score=0;enemyHp=100;update();$('catLabel').textContent=cat==='全部'?'全部國考主題':cat;$('status').textContent='國考特訓開始';nextQuestion()}
function nextQuestion(){if(!pool.length){startGame();return}if(index>=pool.length||hp<=0||enemyHp<=0){$('question').textContent=enemyHp<=0?'Boss 已擊敗！':hp<=0?'挑戰失敗':'本輪完成';$('options').innerHTML='';$('progress').textContent='完成';if(enemyHp<=0){$('victory').classList.add('show');setTimeout(()=>$('victory').classList.remove('show'),1800)}return}current=pool[index++];$('progress').textContent=`第 ${index} 題 / 共 ${pool.length} 題`;$('question').textContent=current.q;$('answer').style.display='none';$('answer').innerHTML=`<b>解析：</b>${current.exp}<div class="source">${current.src}</div>`;const box=$('options');box.innerHTML='';shuffle([...current.options]).forEach(opt=>{const b=document.createElement('button');b.className='option';b.textContent=opt;b.onclick=()=>choose(b,opt);box.appendChild(b)})}
function choose(el,opt){document.querySelectorAll('.option').forEach(x=>x.disabled=true);if(opt===current.ans){el.classList.add('correct');streak++;const damage=streak>=4?24:streak>=2?18:14;score+=damage;enemyHp=Math.max(0,enemyHp-damage);$('status').textContent=streak>=4?'CRITICAL HIT！':'攻擊成功！';animateHit(true,damage)}else{el.classList.add('wrong');streak=0;hp--;enemyHp=Math.min(100,enemyHp+4);$('status').textContent='Boss 反擊！';document.querySelectorAll('.option').forEach(x=>{if(x.textContent===current.ans)x.classList.add('correct')});animateHit(false)}update();$('answer').style.display='block'}
$('startBtn').onclick=startGame;$('nextBtn').onclick=nextQuestion;$('answerBtn').onclick=()=>{if(current)$('answer').style.display='block'};setupCategories();update();
</script>
</body>
</html>
