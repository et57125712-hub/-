.bossFlash{position:absolute;inset:0;background:radial-gradient(circle at 75% 50%,#fff 0 8%,#ff4d6d 18%,rgba(255,0,80,.4) 35%,transparent 65%);opacity:0;z-index:13;pointer-events:none}.bossFlash.on{animation:bossFlash 1s}@keyframes bossFlash{0%{opacity:0;transform:scale(.6)}25%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.4)}}

.bossTalk{position:absolute;right:18px;top:78px;max-width:58%;background:#fff;color:#15151c;border:3px solid #222;border-radius:16px;padding:10px 12px;font-weight:900;z-index:20;opacity:0;transform:translateY(-8px) scale(.92);transition:.22s;box-shadow:5px 5px 0 rgba(0,0,0,.25)}.bossTalk:after{content:"";position:absolute;right:28px;bottom:-14px;border:8px solid transparent;border-top-color:#222}.bossTalk:before{content:"";position:absolute;right:30px;bottom:-10px;border:7px solid transparent;border-top-color:#fff;z-index:2}.bossTalk.show{opacity:1;transform:translateY(0) scale(1)}

.stageBadge{position:absolute;top:72px;left:12px;background:rgba(0,0,0,.66);color:#fff;border-radius:999px;padding:5px 9px;font-size:.78rem;font-weight:900;z-index:8}
.hud{display:flex;justify-content:space-between;margin-top:8px;color:var(--muted)}.hud b{color:var(--cyan)}.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:.86rem;font-weight:800}.question{margin-top:10px;padding:16px;border-radius:14px;background:#0f0418;border-left:4px solid var(--cyan);font-size:1.14rem;line-height:1.5;font-weight:850;min-height:120px}.options{display:grid;gap:9px;margin-top:10px}.option{background:#150621;color:#fff;border:1px solid rgba(53,242,255,.3);text-align:left}.option.correct{border-color:var(--lime);background:rgba(156,255,87,.12)}.option.wrong{border-color:var(--danger);background:rgba(255,72,106,.12)}.answer{display:none;margin-top:10px;padding:12px;border-radius:12px;background:#211408;border:1px solid rgba(255,216,77,.35);line-height:1.6}.source{margin-top:8px;padding-top:8px;border-top:1px dashed rgba(255,216,77,.35);font-size:.88rem;color:#ffe598}.status{min-height:1.2em;margin-top:8px;color:var(--lime);font-weight:850}
.bottom{position:fixed;left:0;right:0;bottom:0;background:#090012;border-top:1px solid rgba(255,59,212,.3);padding:9px 10px calc(9px + env(safe-area-inset-bottom));z-index:30}.bottom .bar{max-width:760px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:520px){.setup{grid-template-columns:1fr}.battle{height:250px}.hero,.monster{font-size:66px}.hero.form2{font-size:74px}.hero.form3{font-size:82px}.hero.form4{font-size:90px}.monster.form2{font-size:80px}.monster.form3{font-size:90px}.monster.form4{font-size:98px}.bossTalk{max-width:68%;font-size:.82rem;right:8px;top:68px}.statusbox{font-size:.8rem}.syringe{left:82px}@keyframes syringeFly{0%{opacity:0;transform:translateX(0) rotate(-20deg)}12%{opacity:1}85%{opacity:1}100%{opacity:0;transform:translateX(235px) translateY(-20px) rotate(25deg) scale(1.1)}}}
</style>
</head>
<body>
<header><h1>免疫守衛戰</h1><p>國考特訓20題・基礎概念與血型題・綜合挑戰</p></header>

<section class="card">
<div class="setup"><select id="gameMode"><option value="all" selected>綜合挑戰（全部題目）</option><option value="national">國考特訓（20題）</option><option value="concept">概念闖關（含血型題）</option></select><button id="startBtn" type="button">開始戰鬥</button></div>
<div id="battle" class="battle"><div id="speedlines" class="speedlines"></div><div class="platform left"></div><div class="platform right"></div><div class="statusbox enemy"><div class="nameRow"><span id="bossName">免疫病毒</span><span>Lv.<span id="bossLv">10</span></span></div><div class="miniHp"><span id="enemyHp"></span></div></div><div class="statusbox heroBox"><div class="nameRow"><span id="heroName">護生守衛</span><span>Lv.<span id="heroLv">1</span></span></div><div class="miniHp"><span id="heroHpBar"></span></div></div><div id="stageBadge" class="stageBadge">STAGE 1 / 5</div><div id="aura" class="aura"></div><div id="hero" class="hero">🧑‍⚕️</div><div id="equip" class="equip">🛡️</div><div id="monster" class="monster">🦠</div><div id="syringe" class="syringe">💉</div><div id="damage" class="damage">-10</div><div id="battleText" class="battleText"></div><div id="bossTalk" class="bossTalk">你們的免疫力，跟考前讀書進度一樣薄弱。</div><div id="bossIntro" class="bossIntro">BOSS BATTLE</div><div id="transformFlash" class="transformFlash"></div><div id="bossFlash" class="bossFlash"></div></div>

</section>
<section class="card"><div class="meta"><span id="progress">尚未開始</span><span id="catLabel">綜合挑戰</span></div><div id="question" class="question">選擇模式後按下「開始戰鬥」。</div><div id="options" class="options"></div><div id="answer" class="answer"></div></section>
</main>
<div class="bottom"><div class="bar"><button id="answerBtn" type="button" class="secondary">查看解析</button><button id="nextBtn" type="button">下一題</button></div></div>

let pool=[],index=0,current=null,hp=7,streak=0,score=0,enemyHp=130,stage=1,maxHp=130,heroForm=1,bossForm=1,locked=false,talkTimer=null,lastLowTalkStage=0;
const $=function(id){return document.getElementById(id)};
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=arr[i];arr[i]=arr[j];arr[j]=t}return arr}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function showText(t){$('battleText').textContent=t;$('battleText').classList.add('show');setTimeout(function(){$('battleText').classList.remove('show')},1100)}
function bossSay(type){const lines=bossLines[stage-1][type]||[];if(!lines.length)return;clearTimeout(talkTimer);const box=$('bossTalk');box.textContent=pick(lines);box.classList.add('show');talkTimer=setTimeout(function(){box.classList.remove('show')},3600)}
function resetHero(){heroForm=1;$('hero').textContent='🧑‍⚕️';$('hero').className='hero';$('equip').classList.remove('show');$('aura').classList.remove('on');$('heroName').textContent='護生守衛'}
function transformHero(form){if(form<=heroForm)return;heroForm=form;$('transformFlash').classList.add('on');setTimeout(function(){$('transformFlash').classList.remove('on')},900);$('hero').classList.remove('form2','form3','form4');if(form===2){$('hero').classList.add('form2');$('equip').textContent='🛡️';$('equip').classList.add('show');$('aura').classList.add('on');$('heroName').textContent='實習護理戰士';showText('裝備防護盾！')}else if(form===3){$('hero').textContent='🥷';$('hero').classList.add('form3');$('equip').textContent='💉';$('heroName').textContent='注射特攻護師';showText('進化成注射特攻護師！')}else if(form===4){$('hero').textContent='🦸';$('hero').classList.add('form4');$('equip').textContent='⚕️';$('heroName').textContent='免疫守護大師';showText('最終變身：免疫守護大師！')}}
function applyBossForm(form){if(form===bossForm)return;bossForm=form;const data=stages[stage-1].forms[form-1];$('monster').classList.remove('form2','form3','form4','transforming');void $('monster').offsetWidth;$('monster').classList.add('transforming');if(form>1)$('monster').classList.add('form'+form);$('monster').textContent=data[1];$('bossName').textContent=data[0];$('bossFlash').classList.add('on');setTimeout(function(){$('bossFlash').classList.remove('on');$('monster').classList.remove('transforming')},1000);if(form===2){showText('Boss 發生突變！')}else if(form===3){$('battle').classList.add('rage');showText('Boss 進入狂暴型態！')}else if(form===4){$('battle').classList.add('rage');showText('危急！Boss 解放終極型態！')}bossSay('transform')}
function updateBossForm(){const ratio=enemyHp/maxHp;if(ratio<=.1)applyBossForm(4);else if(ratio<=.35)applyBossForm(3);else if(ratio<=.7)applyBossForm(2);else applyBossForm(1);if(ratio<=.2&&enemyHp>0&&lastLowTalkStage!==stage){lastLowTalkStage=stage;bossSay('low')}}
function update(){hp=Math.max(0,hp);$('hp').textContent=String(hp);$('streak').textContent=String(streak);$('score').textContent=String(score);$('enemyHp').style.width=Math.max(0,enemyHp/maxHp*100)+'%';$('heroHpBar').style.width=Math.max(0,hp/7*100)+'%';$('heroLv').textContent=String(1+Math.floor(score/100));if(streak>=8)transformHero(4);else if(streak>=5)transformHero(3);else if(streak>=3)transformHero(2);updateBossForm()}
function loadStage(n){stage=n;lastLowTalkStage=0;const s=stages[n-1];enemyHp=s.hp;maxHp=s.hp;bossForm=1;$('battle').className='battle'+(n>1?' stage'+n:'');$('monster').className='monster';$('monster').textContent=s.forms[0][1];$('bossName').textContent=s.forms[0][0];$('bossLv').textContent=String(s.lv);$('stageBadge').textContent='STAGE '+n+' / 5';$('bossIntro').innerHTML='STAGE '+n+'<br><span style="font-size:1rem">'+s.name+'</span>';$('bossIntro').classList.add('show');setTimeout(function(){$('bossIntro').classList.remove('show')},1200);showText(s.name+' 出現了！');update();setTimeout(function(){bossSay('open')},1400)}
function animateAttack(ok,dmg){if(ok){$('hero').classList.add('throw');$('monster').classList.add('hit');$('syringe').classList.add('on');$('damage').textContent='-'+dmg;$('damage').classList.add('on');$('speedlines').classList.add('on')}else{$('hero').classList.add('hit');$('speedlines').classList.add('on')}setTimeout(function(){$('hero').classList.remove('throw','hit');$('monster').classList.remove('hit');$('syringe').classList.remove('on');$('damage').classList.remove('on');$('speedlines').classList.remove('on')},650)}
function startGame(){const mode=$('gameMode').value;pool=mode==='national'?national.slice():mode==='concept'?concept.slice():national.concat(concept);shuffle(pool);index=0;current=null;hp=7;streak=0;score=0;locked=false;resetHero();loadStage(1);$('catLabel').textContent=mode==='national'?'國考特訓':mode==='concept'?'概念闖關（含血型）':'綜合挑戰';$('status').textContent='開始，共 '+pool.length+' 題';nextQuestion()}
function nextQuestion(){if(!pool.length){$('status').textContent='請先按開始戰鬥';return}if(locked)return;if(hp<=0){$('question').textContent='挑戰失敗';$('options').innerHTML='';return}if(index>=pool.length){$('question').textContent='本輪完成';$('options').innerHTML='';return}current=pool[index++];$('progress').textContent='第 '+index+' 題 / 共 '+pool.length+' 題';$('question').textContent=current.q;$('answer').style.display='none';$('answer').innerHTML='<b>解析：</b>'+current.exp+'<div class="source">'+current.src+'</div>';const box=$('options');box.innerHTML='';shuffle(current.options.slice()).forEach(function(opt){const b=document.createElement('button');b.type='button';b.className='option';b.textContent=opt;b.addEventListener('click',function(){choose(b,opt)});box.appendChild(b)})}
function showAnswer(){if(current)$('answer').style.display='block'}
function choose(el,opt){if(locked||!current)return;locked=true;Array.from(document.querySelectorAll('.option')).forEach(function(b){b.disabled=true});if(opt===current.ans){el.classList.add('correct');streak++;const base=streak>=8?20:streak>=5?17:streak>=3?14:streak>=2?12:10;const dmg=Math.max(6,Math.round(base*(1-(stage-1)*.08)));enemyHp=Math.max(0,enemyHp-dmg);score+=base;showText($('heroName').textContent+'使出注射突擊！');animateAttack(true,dmg);update();if(enemyHp<=0){bossSay('defeat');setTimeout(function(){if(stage<5){loadStage(stage+1);locked=false;nextQuestion()}else{$('question').textContent='全部關卡突破！';$('options').innerHTML='';$('progress').textContent='FINAL CLEAR';showText('FINAL CLEAR！')}},1400)}else{locked=false}}else{el.classList.add('wrong');streak=0;resetHero();const bossDmg=Math.min(3,1+Math.floor((stage-1)/2));hp-=bossDmg;showText(stages[stage-1].forms[bossForm-1][0]+' 發動反擊！');bossSay('wrong');animateAttack(false,0);Array.from(document.querySelectorAll('.option')).forEach(function(b){if(b.textContent===current.ans)b.classList.add('correct')});update();locked=false}$('answer').style.display='block'}
window.addEventListener('DOMContentLoaded',function(){$('startBtn').addEventListener('click',startGame);$('nextBtn').addEventListener('click',nextQuestion);$('answerBtn').addEventListener('click',showAnswer);update()});
