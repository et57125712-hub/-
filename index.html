<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#05000a"><title>免疫守衛戰</title><style>:root{--cyan:#35f2ff;--pink:#ff3bd4;--lime:#9cff57;--danger:#ff486a;--gold:#ffd84d;--text:#f7f7ff;--muted:#aaa0bd}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:linear-gradient(180deg,#05000a,#0d0118 60%,#030006);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Microsoft JhengHei",sans-serif}header{padding:15px 14px;background:#090012;border-bottom:1px solid rgba(53,242,255,.3);position:sticky;top:0;z-index:20}header h1{margin:0;font-size:1.2rem}header p{margin:4px 0 0;color:var(--muted);font-size:.82rem}main{max-width:760px;margin:auto;padding:12px 12px 104px}.card{background:#12021f;border:1px solid rgba(53,242,255,.22);border-radius:18px;padding:14px;margin:12px 0}.setup{display:grid;grid-template-columns:1fr 1fr;gap:8px}button,select{width:100%;border-radius:12px;padding:12px;font-size:1rem;font-weight:850}select{background:#180628;color:#fff;border:1px solid rgba(53,242,255,.3)}button{border:1px solid var(--cyan);background:linear-gradient(90deg,var(--cyan),#b4fbff);color:#001116}button.secondary{background:#1a0a25;color:#fff;border-color:#624379}.battle{position:relative;height:240px;overflow:hidden;border-radius:16px;background:radial-gradient(circle at 50% 80%,rgba(53,242,255,.15),transparent 35%),linear-gradient(180deg,#130022,#06000c);margin-top:10px;border:1px solid rgba(255,59,212,.25)}.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(53,242,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(53,242,255,.08) 1px,transparent 1px);background-size:28px 28px;transform:perspective(200px) rotateX(55deg) scale(1.4);transform-origin:bottom;opacity:.45}.hero,.monster{position:absolute;bottom:30px;font-size:72px}.hero{left:28px}.monster{right:30px;animation:float 1.7s ease-in-out infinite}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}.hero.throw{animation:throw .5s}.monster.hit{animation:monsterHit .45s}.hero.hit{animation:heroHit .45s}@keyframes throw{0%{transform:translateX(0)}40%{transform:translateX(16px) rotate(-8deg) scale(1.06)}100%{transform:translateX(0)}}@keyframes monsterHit{0%{transform:translateX(0)}35%{transform:translateX(18px) rotate(10deg)}65%{transform:translateX(-14px) rotate(-7deg)}100%{transform:translateX(0)}}@keyframes heroHit{0%{transform:translateX(0)}40%{transform:translateX(-18px) rotate(-8deg)}100%{transform:translateX(0)}}.syringe{position:absolute;left:92px;bottom:87px;font-size:36px;opacity:0;z-index:4}.syringe.on{animation:syringeFly .55s ease-out}@keyframes syringeFly{0%{opacity:0;transform:translateX(0) rotate(-15deg)}15%{opacity:1}85%{opacity:1}100%{opacity:0;transform:translateX(350px) translateY(-18px) rotate(18deg)}}.damage{position:absolute;right:78px;bottom:125px;color:var(--gold);font-size:1.6rem;font-weight:1000;opacity:0}.damage.on{animation:damage .65s}@keyframes damage{0%{opacity:0}25%{opacity:1;transform:scale(1.1)}100%{opacity:0;transform:translateY(-35px)}}.enemy-name{position:absolute;top:12px;left:14px;font-weight:950;color:#ff9aad}.hpbar{position:absolute;top:40px;left:14px;right:14px;height:18px;background:#220514;border-radius:999px;overflow:hidden}.hpbar span{display:block;height:100%;width:100%;background:linear-gradient(90deg,#ff486a,#ff9a3d);transition:width .35s}.phase{position:absolute;top:66px;left:14px;color:var(--muted);font-size:.8rem}.hud{display:flex;justify-content:space-between;margin-top:8px;color:var(--muted)}.hud b{color:var(--cyan)}.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:.86rem;font-weight:800}.question{margin-top:10px;padding:16px;border-radius:14px;background:#0f0418;border-left:4px solid var(--cyan);font-size:1.14rem;line-height:1.5;font-weight:850;min-height:120px}.options{display:grid;gap:9px;margin-top:10px}.option{background:#150621;color:#fff;border:1px solid rgba(53,242,255,.3);text-align:left}.option.correct{border-color:var(--lime);background:rgba(156,255,87,.12)}.option.wrong{border-color:var(--danger);background:rgba(255,72,106,.12)}.answer{display:none;margin-top:10px;padding:12px;border-radius:12px;background:#211408;border:1px solid rgba(255,216,77,.35);line-height:1.6}.source{margin-top:8px;padding-top:8px;border-top:1px dashed rgba(255,216,77,.35);font-size:.88rem;color:#ffe598}.status{min-height:1.2em;margin-top:8px;color:var(--lime);font-weight:850}.bottom{position:fixed;left:0;right:0;bottom:0;background:#090012;border-top:1px solid rgba(255,59,212,.3);padding:9px 10px calc(9px + env(safe-area-inset-bottom));z-index:30}.bottom .bar{max-width:760px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}@media(max-width:520px){.setup{grid-template-columns:1fr}.syringe{left:78px}@keyframes syringeFly{0%{opacity:0;transform:translateX(0) rotate(-15deg)}15%{opacity:1}85%{opacity:1}100%{opacity:0;transform:translateX(245px) translateY(-18px) rotate(18deg)}}}</style></head><body><header><h1>免疫守衛戰</h1><p>國考特訓20題・概念闖關50題・綜合挑戰70題</p></header><main><section class="card"><div class="setup"><select id="gameMode"><option value="national">國考特訓（20題）</option><option value="concept">概念闖關（50題）</option><option value="all">綜合挑戰（70題）</option></select><button id="startBtn">開始戰鬥</button></div><div class="battle"><div class="grid"></div><div class="enemy-name">IMMUNO VIRUS BOSS</div><div class="hpbar"><span id="enemyHp"></span></div><div id="phase" class="phase">Phase 1</div><div id="hero" class="hero">🧑‍⚕️</div><div id="monster" class="monster">🦠</div><div id="syringe" class="syringe">💉</div><div id="damage" class="damage">-18</div></div><div class="hud"><span>生命 <b id="hp">5</b></span><span>連勝 <b id="streak">0</b></span><span>分數 <b id="score">0</b></span></div><div id="status" class="status"></div></section><section class="card"><div class="meta"><span id="progress">尚未開始</span><span id="catLabel">國考特訓</span></div><div id="question" class="question">選擇模式後按下「開始戰鬥」。</div><div id="options" class="options"></div><div id="answer" class="answer"></div></section></main><div class="bottom"><div class="bar"><button id="answerBtn" class="secondary">查看解析</button><button id="nextBtn">下一題</button></div></div><script>const national=[{q:'過敏性休克時最可能出現哪一項血管變化？',options:['小動脈擴張','微血管通透性下降','心輸出量一定上升','血管全面收縮'],ans:'小動脈擴張',exp:'過敏性休克可造成全身性血管擴張與通透性增加。',src:'112年第2次護理師國考－基礎醫學，第16題；本題已重新改寫。'},{q:'重症肌無力與哪一種神經傳導物質相關？',options:['乙醯膽鹼','血清素','組織胺','腎上腺素'],ans:'乙醯膽鹼',exp:'重症肌無力與乙醯膽鹼受體相關自體抗體有關。',src:'112年第2次護理師國考－基礎醫學，第12題；本題已重新改寫。'},{q:'glycocalyx 最主要參與哪一種功能？',options:['細胞辨識與環境互動','穩定細胞核','製造ATP','形成肌絲'],ans:'細胞辨識與環境互動',exp:'glycocalyx 參與細胞辨識、黏附與環境互動。',src:'112年第3次護理師國考－基礎醫學，第11題；本題已重新改寫。'},{q:'單核球進入組織後最可能分化成？',options:['巨噬細胞','嗜酸性球','嗜鹼性球','淋巴球'],ans:'巨噬細胞',exp:'單核球進入組織後可分化為巨噬細胞。',src:'114年第2次護理師國考－基礎醫學，第5題；本題已重新改寫。'},{q:'下列何者不是淋巴器官？',options:['松果腺','胸腺','脾臟','扁桃腺'],ans:'松果腺',exp:'松果腺屬內分泌器官。',src:'114年第3次護理師國考－基礎醫學，第5題；本題已重新改寫。'},{q:'外源性抗原呈現給CD4⁺ T細胞主要透過？',options:['MHC class II','MHC class I','IgG','C3b'],ans:'MHC class II',exp:'外源性抗原通常由MHC class II呈現。',src:'依近年護理師國考概念改寫。'},{q:'內源性抗原呈現給CD8⁺ T細胞主要透過？',options:['MHC class I','MHC class II','IgA','C5a'],ans:'MHC class I',exp:'內源性抗原通常由MHC class I呈現。',src:'依近年護理師國考概念改寫。'},{q:'大量分泌抗體的細胞是？',options:['漿細胞','NK細胞','嗜中性球','Treg'],ans:'漿細胞',exp:'B細胞活化後可分化為漿細胞。',src:'依近年護理師國考概念改寫。'},{q:'補體末端形成的破膜構造是？',options:['膜攻擊複合體MAC','免疫突觸','抗原受體','發炎小體'],ans:'膜攻擊複合體MAC',exp:'C5b-C9形成MAC。',src:'依近年護理師國考概念改寫。'},{q:'第一型過敏反應最典型的抗體是？',options:['IgE','IgG','IgM','IgD'],ans:'IgE',exp:'IgE與肥大細胞參與立即型過敏反應。',src:'依近年護理師國考概念改寫。'},{q:'黏膜分泌液中最具代表性的抗體是？',options:['IgA','IgM','IgE','IgD'],ans:'IgA',exp:'分泌型IgA是黏膜免疫的重要抗體。',src:'依近年護理師國考概念改寫。'},{q:'最能促進巨噬細胞活化的是？',options:['TH1細胞','TH2細胞','紅血球','血小板'],ans:'TH1細胞',exp:'TH1可分泌IFN-γ促進巨噬細胞活化。',src:'依近年護理師國考概念改寫。'},{q:'維持自體耐受的重要T細胞是？',options:['Treg','TH17','CD8⁺ T細胞','NK細胞'],ans:'Treg',exp:'Treg可抑制過度免疫反應。',src:'依近年護理師國考概念改寫。'},{q:'不相容輸血引起抗體攻擊紅血球，屬於哪一型？',options:['第二型','第一型','第三型','第四型'],ans:'第二型',exp:'第二型過敏反應涉及抗體攻擊細胞表面抗原。',src:'依近年護理師國考概念改寫。'},{q:'免疫複合物沉積屬於哪一型過敏反應？',options:['第三型','第一型','第二型','第四型'],ans:'第三型',exp:'第三型的核心是免疫複合物沉積。',src:'依近年護理師國考概念改寫。'},{q:'接觸性皮膚炎屬於哪一型過敏反應？',options:['第四型','第一型','第二型','第三型'],ans:'第四型',exp:'第四型由T細胞媒介。',src:'依近年護理師國考概念改寫。'},{q:'HIV主要破壞哪一類細胞？',options:['CD4⁺ T細胞','CD8⁺ T細胞','B細胞','嗜中性球'],ans:'CD4⁺ T細胞',exp:'HIV主要感染並破壞CD4⁺ T細胞。',src:'依近年護理師國考概念改寫。'},{q:'移植排斥最重要的辨識分子是？',options:['MHC分子','IgA','IL-10','CRP'],ans:'MHC分子',exp:'MHC差異是移植排斥的重要基礎。',src:'依近年護理師國考概念改寫。'},{q:'NK細胞較容易攻擊哪一類目標？',options:['MHC class I降低的異常細胞','正常紅血球','正常血小板','正常骨骼肌'],ans:'MHC class I降低的異常細胞',exp:'NK細胞會注意MHC class I表現降低的異常細胞。',src:'依近年護理師國考概念改寫。'},{q:'SLE常見的免疫傷害機轉是？',options:['免疫複合物沉積','皮膚屏障破壞','紅血球運氧不足','凝血因子缺乏'],ans:'免疫複合物沉積',exp:'SLE常涉及自體抗體與免疫複合物沉積。',src:'依近年護理師國考概念改寫。'}];const conceptBase=[['記憶守衛','哪一種細胞能讓再次遇到相同抗原時反應更快？','記憶細胞'],['城牆防線','皮膚與黏膜最像哪種防禦？','第一線屏障'],['抗體工廠','大量製造抗體的細胞是？','漿細胞'],['巡邏殺手','發現MHC I降低就可能攻擊的細胞是？','自然殺手細胞'],['煞車系統','抑制過度免疫反應的細胞是？','調節型T細胞'],['專用武器','針對特定抗原設計反應代表？','專一性'],['戰後紀錄','下次反應更快代表？','免疫記憶'],['誤傷自己','攻擊自身組織代表？','自體免疫'],['支援部隊','可協助標記發炎破壞病原的系統是？','補體系統'],['紅腫熱痛','這些局部表現屬於？','發炎反應'],['戰情通報','展示抗原片段給T細胞稱為？','抗原呈現'],['雙重合作','最適合完成標記與破壞的是？','抗體與補體'],['精銳留守','免疫反應後留下的是？','記憶細胞'],['找錯角色','紅血球負責抗原呈現是否正確？','錯誤'],['過敏速度','所有過敏反應都立即發生是否正確？','錯誤'],['補體身份','補體就是抗體是否正確？','錯誤'],['呼吸循環','嚴重過敏最先評估什麼？','呼吸與循環'],['疫苗效果','疫苗重要目標之一是？','建立免疫記憶'],['反覆感染','免疫功能受損最符合？','免疫缺乏'],['新器官被攻擊','最符合哪種現象？','移植排斥'],['腫瘤隱形','降低辨識訊號稱為？','免疫逃脫'],['守門員','把敵人擋在外面的構造是？','皮膚與黏膜'],['情報官','攝取並展示抗原的是？','抗原呈現細胞'],['狙擊手','直接殺死被感染細胞的是？','毒殺型T細胞'],['通訊系統','免疫細胞間訊號是？','細胞激素'],['免疫煞車','避免誤傷自己的細胞是？','Treg'],['快速吞噬','屬於哪類免疫？','先天免疫'],['特定反應','屬於哪類免疫？','後天免疫'],['體液武器','最代表體液性免疫的是？','抗體'],['直接攻擊','最代表細胞性免疫的是？','T細胞直接作用'],['免疫失調','誤攻自身最符合？','自體免疫'],['召集援軍','釋放訊號召集更多細胞是？','細胞激素作用'],['保留記憶','避免下次措手不及需保留？','記憶細胞'],['辨識失敗','防禦部隊亂打最缺少？','專一性辨識'],['降低排斥','最直接方向是？','抑制免疫攻擊'],['腫瘤監視','失效的核心環節是？','異常細胞辨識與清除'],['Boss假訊號','誤認正常細胞為敵人是？','自體免疫'],['Boss隱形','降低表面標記是？','免疫逃脫'],['警報風暴','大量訊號導致反應過度是？','免疫反應失控'],['記憶清除','下一次反應不再快速是失去？','免疫記憶'],['假和平','外來器官持續被攻擊是？','移植排斥'],['三階段','辨識攻擊記憶代表？','後天免疫流程'],['抗體比喻','抗體最像？','專屬標籤'],['補體比喻','補體最像？','支援部隊'],['細胞激素比喻','細胞激素最像？','戰場通訊'],['免疫耐受','最像哪個概念？','知道誰是自己人'],['初次反應','最早常見的抗體是？','IgM'],['胎盤抗體','可通過胎盤的是？','IgG'],['黏膜抗體','最重要的是？','IgA'],['過敏抗體','立即型過敏主要是？','IgE']];const concept=conceptBase.map((x,i)=>({q:x[1],options:[x[2],i%2?'紅血球':'血小板',i%3?'胰島素':'膽汁',i%4?'骨骼肌':'角質'],ans:x[2],exp:'本題以概念活化方式複習免疫機轉。',src:'教師自編概念題。'}));let pool=[],index=0,current=null,hp=5,streak=0,score=0,enemyHp=100;const $=id=>document.getElementById(id);function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function update(){hp=Math.max(0,hp);$('hp').textContent=hp;$('streak').textContent=streak;$('score').textContent=score;$('enemyHp').style.width=enemyHp+'%';$('phase').textContent=enemyHp>66?'Phase 1':enemyHp>33?'Phase 2':'Final Phase'}function animateHit(ok,damage=0){if(ok){$('hero').classList.add('throw');$('monster').classList.add('hit');$('syringe').classList.add('on');$('damage').textContent='-'+damage;$('damage').classList.add('on')}else{$('hero').classList.add('hit')}setTimeout(()=>{$('hero').classList.remove('throw','hit');$('monster').classList.remove('hit');$('syringe').classList.remove('on');$('damage').classList.remove('on')},620)}function startGame(){const mode=$('gameMode').value;pool=mode==='national'?[...national]:mode==='concept'?[...concept]:[...national,...concept];shuffle(pool);index=0;hp=5;streak=0;score=0;enemyHp=100;update();const labels={national:'國考特訓',concept:'概念闖關',all:'綜合挑戰'};$('catLabel').textContent=labels[mode];$('status').textContent=`${labels[mode]}開始，共 ${pool.length} 題`;nextQuestion()}function nextQuestion(){if(!pool.length){startGame();return}if(index>=pool.length||hp<=0||enemyHp<=0){$('question').textContent=enemyHp<=0?'Boss已擊敗！':hp<=0?'挑戰失敗':'本輪完成';$('options').innerHTML='';$('progress').textContent='完成';return}current=pool[index++];$('progress').textContent=`第 ${index} 題 / 共 ${pool.length} 題`;$('question').textContent=current.q;$('answer').style.display='none';$('answer').innerHTML=`<b>解析：</b>${current.exp}<div class="source">${current.src}</div>`;const box=$('options');box.innerHTML='';shuffle([...current.options]).forEach(opt=>{const b=document.createElement('button');b.className='option';b.textContent=opt;b.onclick=()=>choose(b,opt);box.appendChild(b)})}function choose(el,opt){document.querySelectorAll('.option').forEach(x=>x.disabled=true);if(opt===current.ans){el.classList.add('correct');streak++;const d=streak>=4?24:streak>=2?18:14;score+=d;enemyHp=Math.max(0,enemyHp-d);$('status').textContent='針筒攻擊成功！';animateHit(true,d)}else{el.classList.add('wrong');streak=0;hp--;$('status').textContent='Boss反擊！';document.querySelectorAll('.option').forEach(x=>{if(x.textContent===current.ans)x.classList.add('correct')});animateHit(false)}update();$('answer').style.display='block'}$('startBtn').onclick=startGame;$('nextBtn').onclick=nextQuestion;$('answerBtn').onclick=()=>{if(current)$('answer').style.display='block'};update();</script></body></html>
