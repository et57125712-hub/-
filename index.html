<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#07000f">
<title>免疫學複習遊戲</title>
<style>
:root{--bg:#07000f;--panel:#12021f;--cyan:#35f2ff;--pink:#ff3bd4;--lime:#9cff57;--text:#f7f7ff;--muted:#aaa0bd;--danger:#ff486a}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;min-height:100vh;background:linear-gradient(180deg,#07000f,#0d0118 60%,#040008);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Microsoft JhengHei","Noto Sans TC",sans-serif}
header{padding:16px 14px;background:#090012;border-bottom:1px solid rgba(53,242,255,.3);position:sticky;top:0;z-index:10}
header h1{margin:0;font-size:1.2rem;letter-spacing:.05em}header p{margin:4px 0 0;color:var(--muted);font-size:.82rem}
main{max-width:720px;margin:auto;padding:12px 12px 100px}
.card{background:#12021f;border:1px solid rgba(53,242,255,.22);border-radius:18px;padding:14px;margin:12px 0}
.setup{display:grid;grid-template-columns:1fr 1fr;gap:8px}
button,select{width:100%;border-radius:12px;padding:12px;font-size:1rem;font-weight:800;touch-action:manipulation}
select{background:#180628;color:#fff;border:1px solid rgba(53,242,255,.3)}
button{border:1px solid var(--cyan);background:var(--cyan);color:#001116}
button.secondary{background:#1a0a25;color:#fff;border-color:#624379}
.sound{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.hud{display:flex;justify-content:space-between;gap:8px;margin-top:10px;color:var(--muted);font-size:.9rem}.hud b{color:var(--cyan)}
.progress{height:8px;background:#200b2e;border-radius:999px;overflow:hidden;margin-top:10px}.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--pink),var(--cyan))}
.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:.86rem;font-weight:800}
.question{margin-top:10px;padding:16px;border-radius:14px;background:#0f0418;border-left:4px solid var(--cyan);font-size:1.15rem;line-height:1.5;font-weight:850;min-height:120px}
.options{display:grid;gap:9px;margin-top:10px}.option{background:#150621;color:#fff;border:1px solid rgba(53,242,255,.3);text-align:left}.option.correct{border-color:var(--lime);background:rgba(156,255,87,.12)}.option.wrong{border-color:var(--danger);background:rgba(255,72,106,.12)}
.answer{display:none;margin-top:10px;padding:12px;border-radius:12px;background:#211408;border:1px solid rgba(255,216,77,.35);line-height:1.6}
.status{min-height:1.2em;margin-top:8px;color:var(--lime);font-weight:800}
.bottom{position:fixed;left:0;right:0;bottom:0;background:#090012;border-top:1px solid rgba(255,59,212,.3);padding:9px 10px calc(9px + env(safe-area-inset-bottom));z-index:12}.bottom .bar{max-width:720px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:520px){.setup{grid-template-columns:1fr}.sound{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header><h1>免疫學期末複習</h1><p>概念闖關｜手機版</p></header>
<main>
<section class="card">
<div class="setup">
<select id="mode"><option value="choice">單人自測</option><option value="open">小組搶答</option></select>
<select id="category"><option value="全部">全部題目</option></select>
<button id="startBtn">開始</button><button id="resetBtn" class="secondary">重置</button>
</div>
<div class="sound"><button id="musicBtn" class="secondary">配樂：開啟</button><button id="sfxBtn" class="secondary">音效：開啟</button></div>
<div class="hud"><span>生命值 <b id="hp">3</b></span><span>連勝 <b id="streak">0</b></span><span>分數 <b id="personalScore">0</b></span></div>
<div class="progress"><span id="bar"></span></div><div id="status" class="status"></div>
</section>
<section class="card">
<div class="meta"><span id="progress">尚未開始</span><span id="catLabel">全部題目</span></div>
<div id="question" class="question">按下「開始」進行複習。</div>
<div id="options" class="options"></div><div id="answer" class="answer"></div>
</section>
</main>
<div class="bottom"><div class="bar"><button id="answerBtn" class="secondary">顯示答案</button><button id="nextBtn">下一題</button></div></div>
<script>
const questions=[{"cat":"免疫基礎","q":"皮膚、黏膜與正常菌叢主要屬於哪一類防禦？","options":["先天性免疫第一道防線","後天性體液免疫","細胞性免疫記憶","人工被動免疫"],"ans":"先天性免疫第一道防線","exp":"皮膚、黏膜與正常菌叢是身體最前線的非專一性防禦。"},{"cat":"免疫基礎","q":"與初次免疫反應相比，二次免疫反應通常有何特色？","options":["反應較快且抗體親和力較高","遲滯期較長","主要只有IgM","不會產生記憶細胞"],"ans":"反應較快且抗體親和力較高","exp":"二次免疫反應因記憶細胞存在，反應更快、更強。"},{"cat":"免疫基礎","q":"接種疫苗後由人體自行產生免疫反應與記憶細胞，稱為？","options":["人工主動免疫","天然被動免疫","人工被動免疫","先天性免疫"],"ans":"人工主動免疫","exp":"疫苗是人工給予抗原，讓身體主動產生免疫。"},{"cat":"免疫基礎","q":"胎兒經由胎盤獲得母體IgG，屬於？","options":["天然被動免疫","人工主動免疫","天然主動免疫","人工被動免疫"],"ans":"天然被動免疫","exp":"母體抗體自然傳給胎兒，胎兒本身未主動製造。"},{"cat":"免疫細胞","q":"下列何者均屬主要抗原呈現細胞？","options":["樹突細胞、巨噬細胞、B細胞","T細胞、NK細胞、嗜中性球","紅血球、血小板、肥大細胞","嗜酸性球、紅血球、T細胞"],"ans":"樹突細胞、巨噬細胞、B細胞","exp":"三大抗原呈現細胞：樹突細胞、巨噬細胞、B細胞。"},{"cat":"免疫細胞","q":"感染初期最常快速到達感染部位並吞噬細菌的是？","options":["嗜中性球","漿細胞","記憶B細胞","調節型T細胞"],"ans":"嗜中性球","exp":"嗜中性球是急性發炎早期重要吞噬細胞。"},{"cat":"T細胞與MHC","q":"CD4+輔助型T細胞主要辨識由哪一類分子呈現的抗原胜肽？","options":["MHC class II","MHC class I","IgM","補體C3"],"ans":"MHC class II","exp":"CD4+ T細胞主要辨識MHC II呈現的抗原。"},{"cat":"T細胞與MHC","q":"CD8+毒殺型T細胞辨識病毒感染細胞時，主要受到哪類分子限制？","options":["MHC class I","MHC class II","CD19","IgA"],"ans":"MHC class I","exp":"CD8+ T細胞主要辨識MHC I呈現的抗原。"},{"cat":"抗原抗體","q":"一個典型單體抗體分子具有幾個抗原結合部位？","options":["2個","1個","3個","4個"],"ans":"2個","exp":"典型單體抗體有兩個抗原結合部位。"},{"cat":"免疫球蛋白","q":"新生兒可由母乳初乳獲得較多哪一種免疫球蛋白以保護腸道黏膜？","options":["分泌型IgA","IgE","IgM","IgD"],"ans":"分泌型IgA","exp":"分泌型IgA主要保護黏膜表面。"},{"cat":"免疫球蛋白","q":"可通過胎盤，提供胎兒被動免疫的免疫球蛋白是？","options":["IgG","IgM","IgA","IgE"],"ans":"IgG","exp":"IgG是唯一能有效通過胎盤的抗體。"},{"cat":"補體與發炎","q":"補體傳統、凝集素與替代途徑最後皆可形成何種構造？","options":["攻膜複合物","抗原受體","免疫複合物","溶酶體"],"ans":"攻膜複合物","exp":"三條補體途徑最後可形成MAC攻擊目標細胞膜。"},{"cat":"補體與發炎","q":"下列何者是發炎反應常見的局部表現？","options":["紅、腫、熱、痛","紅、白、冷、麻","蒼白、冰冷、無痛、乾燥","咳嗽、流鼻水、腹瀉、嘔吐"],"ans":"紅、腫、熱、痛","exp":"發炎典型局部表現為紅、腫、熱、痛。"},{"cat":"過敏反應","q":"即發型過敏反應時，肥大細胞常釋放何種物質引起血管擴張與搔癢？","options":["組織胺","胰島素","膽汁","血紅素"],"ans":"組織胺","exp":"組織胺會造成血管擴張、通透性增加與搔癢。"},{"cat":"自體免疫","q":"自體免疫疾病的核心問題是？","options":["免疫系統攻擊自身組織","紅血球完全消失","所有抗體都不會作用","所有T細胞都變成紅血球"],"ans":"免疫系統攻擊自身組織","exp":"自體免疫是免疫耐受失衡，導致攻擊自己。"}];
let pool=[],index=0,current=null,hp=3,streak=0,score=0;let audioCtx=null,musicOn=false,sfxOn=true,musicTimer=null;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}
function tone(f,d=.12,t='sine',v=.04,w=0){ensureAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(audioCtx.destination);const s=audioCtx.currentTime+w;o.start(s);o.stop(s+d)}
function playSfx(ok){if(!sfxOn)return;if(ok){tone(660,.1,'square');tone(880,.12,'square',.03,.08)}else{tone(180,.16,'sawtooth',.05);tone(120,.2,'sawtooth',.04,.1)}}
function startMusic(){if(musicOn)return;musicOn=true;ensureAudio();document.getElementById('musicBtn').textContent='配樂：關閉';const notes=[110,130.8,98,146.8];let i=0;musicTimer=setInterval(()=>{tone(notes[i%notes.length],.15,'square',.012);i++},320)}
function stopMusic(){musicOn=false;clearInterval(musicTimer);document.getElementById('musicBtn').textContent='配樂：開啟'}
function setupCategories(){[...new Set(questions.map(q=>q.cat))].forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;document.getElementById('category').appendChild(o)})}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function updateHud(){document.getElementById('hp').textContent=Math.max(0,hp);document.getElementById('streak').textContent=streak;document.getElementById('personalScore').textContent=score}
function startGame(){ensureAudio();const cat=document.getElementById('category').value;pool=questions.filter(q=>cat==='全部'||q.cat===cat);shuffle(pool);index=0;hp=3;streak=0;score=0;updateHud();document.getElementById('catLabel').textContent=cat==='全部'?'全部題目':cat;document.getElementById('status').textContent='題目已載入';nextQuestion()}
function nextQuestion(){if(!pool.length){startGame();return}if(index>=pool.length||hp<=0){document.getElementById('question').textContent=hp<=0?'挑戰結束':'全部完成';document.getElementById('options').innerHTML='';document.getElementById('progress').textContent='完成';return}current=pool[index++];document.getElementById('progress').textContent=`第 ${index} 題 / 共 ${pool.length} 題`;document.getElementById('bar').style.width=(index/pool.length*100)+'%';document.getElementById('question').textContent=current.q;document.getElementById('answer').style.display='none';document.getElementById('answer').innerHTML=`<b>答案：</b>${current.ans}<br><b>解析：</b>${current.exp}`;const box=document.getElementById('options');box.innerHTML='';if(document.getElementById('mode').value==='open'){box.innerHTML='<div style="color:var(--muted)">小組討論後，再顯示答案。</div>';return}shuffle([...current.options]).forEach(opt=>{const b=document.createElement('button');b.className='option';b.textContent=opt;b.onclick=()=>choose(b,opt);box.appendChild(b)})}
function choose(el,opt){document.querySelectorAll('.option').forEach(x=>x.disabled=true);if(opt===current.ans){el.classList.add('correct');streak++;score+=10;playSfx(true);document.getElementById('status').textContent='答對了'}else{el.classList.add('wrong');streak=0;hp--;playSfx(false);document.getElementById('status').textContent='再看一次解析';document.querySelectorAll('.option').forEach(x=>{if(x.textContent===current.ans)x.classList.add('correct')})}updateHud();showAnswer()}
function showAnswer(){if(current)document.getElementById('answer').style.display='block'}
function resetGame(){pool=[];index=0;current=null;hp=3;streak=0;score=0;updateHud();document.getElementById('question').textContent='按下「開始」進行複習。';document.getElementById('options').innerHTML='';document.getElementById('answer').style.display='none';document.getElementById('progress').textContent='尚未開始';document.getElementById('bar').style.width='0%';document.getElementById('status').textContent=''}
document.getElementById('startBtn').onclick=startGame;document.getElementById('resetBtn').onclick=resetGame;document.getElementById('nextBtn').onclick=nextQuestion;document.getElementById('answerBtn').onclick=showAnswer;document.getElementById('musicBtn').onclick=()=>musicOn?stopMusic():startMusic();document.getElementById('sfxBtn').onclick=()=>{sfxOn=!sfxOn;document.getElementById('sfxBtn').textContent='音效：'+(sfxOn?'開啟':'關閉')};setupCategories();updateHud();
</script>
</body>
</html>
