<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>免疫守衛戰</title>
<style>
:root{--bg:#07000f;--panel:#12021f;--cyan:#35f2ff;--pink:#ff3bd4;--lime:#9cff57;--danger:#ff486a;--text:#f7f7ff;--muted:#aaa0bd}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:linear-gradient(180deg,#07000f,#0d0118 60%,#040008);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Microsoft JhengHei","Noto Sans TC",sans-serif}
header{padding:15px 14px;background:#090012;border-bottom:1px solid rgba(53,242,255,.3);position:sticky;top:0;z-index:10}
header h1{margin:0;font-size:1.2rem} header p{margin:4px 0 0;color:var(--muted);font-size:.82rem}
main{max-width:720px;margin:auto;padding:12px 12px 100px}
.card{background:#12021f;border:1px solid rgba(53,242,255,.22);border-radius:18px;padding:14px;margin:12px 0}
.setup{display:grid;grid-template-columns:1fr 1fr;gap:8px}
button,select{width:100%;border-radius:12px;padding:12px;font-size:1rem;font-weight:800;touch-action:manipulation}
select{background:#180628;color:#fff;border:1px solid rgba(53,242,255,.3)} button{border:1px solid var(--cyan);background:var(--cyan);color:#001116} button.secondary{background:#1a0a25;color:#fff;border-color:#624379}
.battle{position:relative;height:210px;overflow:hidden;border-radius:16px;background:radial-gradient(circle at 50% 70%,rgba(53,242,255,.15),transparent 35%),linear-gradient(180deg,#130022,#06000c);margin-top:10px;border:1px solid rgba(255,59,212,.25)}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(53,242,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(53,242,255,.08) 1px,transparent 1px);background-size:28px 28px;transform:perspective(200px) rotateX(55deg) scale(1.4);transform-origin:bottom;opacity:.45}
.hero,.monster{position:absolute;bottom:28px;font-size:70px;filter:drop-shadow(0 0 12px rgba(53,242,255,.7));transition:transform .25s}.hero{left:28px}.monster{right:30px;filter:drop-shadow(0 0 14px rgba(255,72,106,.75));animation:float 1.8s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hit{animation:hit .35s}@keyframes hit{0%{transform:translateX(0)}40%{transform:translateX(-18px) rotate(-8deg)}100%{transform:translateX(0)}}
.attack{animation:attack .35s}@keyframes attack{0%{transform:translateX(0)}50%{transform:translateX(55px)}100%{transform:translateX(0)}}
.flash{position:absolute;inset:0;background:rgba(255,255,255,.35);opacity:0;pointer-events:none}.flash.on{animation:flash .3s}@keyframes flash{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
.enemy-name{position:absolute;top:12px;left:14px;font-weight:900;color:#ff9aad}.hpbar{position:absolute;top:40px;left:14px;right:14px;height:16px;background:#220514;border-radius:999px;overflow:hidden;border:1px solid rgba(255,72,106,.45)}.hpbar span{display:block;height:100%;width:100%;background:linear-gradient(90deg,#ff486a,#ff9a3d);transition:width .3s}
.hud{display:flex;justify-content:space-between;margin-top:8px;color:var(--muted);font-size:.9rem}.hud b{color:var(--cyan)}
.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:.86rem;font-weight:800}
.question{margin-top:10px;padding:16px;border-radius:14px;background:#0f0418;border-left:4px solid var(--cyan);font-size:1.15rem;line-height:1.5;font-weight:850;min-height:120px}
.options{display:grid;gap:9px;margin-top:10px}.option{background:#150621;color:#fff;border:1px solid rgba(53,242,255,.3);text-align:left}.option.correct{border-color:var(--lime);background:rgba(156,255,87,.12)}.option.wrong{border-color:var(--danger);background:rgba(255,72,106,.12)}
.answer{display:none;margin-top:10px;padding:12px;border-radius:12px;background:#211408;border:1px solid rgba(255,216,77,.35);line-height:1.6}.status{min-height:1.2em;margin-top:8px;color:var(--lime);font-weight:800}
.bottom{position:fixed;left:0;right:0;bottom:0;background:#090012;border-top:1px solid rgba(255,59,212,.3);padding:9px 10px calc(9px + env(safe-area-inset-bottom));z-index:12}.bottom .bar{max-width:720px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:520px){.setup{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>免疫守衛戰</h1><p>單人闖關｜概念型題目｜打怪進度</p></header>
<main>
<section class="card"><div class="setup"><select id="category"><option value="全部">全部題型</option></select><button id="startBtn">開始戰鬥</button></div><div class="battle"><div class="grid"></div><div class="enemy-name">VIRUS BOSS</div><div class="hpbar"><span id="enemyHp"></span></div><div id="hero" class="hero">🧑‍⚕️</div><div id="monster" class="monster">🦠</div><div id="flash" class="flash"></div></div><div class="hud"><span>生命 <b id="hp">3</b></span><span>連勝 <b id="streak">0</b></span><span>分數 <b id="score">0</b></span></div><div id="status" class="status"></div></section>
<section class="card"><div class="meta"><span id="progress">尚未開始</span><span id="catLabel">全部題型</span></div><div id="question" class="question">按下「開始戰鬥」。</div><div id="options" class="options"></div><div id="answer" class="answer"></div></section>
</main>
<div class="bottom"><div class="bar"><button id="answerBtn" class="secondary">查看提示</button><button id="nextBtn">下一題</button></div></div>
<script>
const questions=[{"cat":"概念配對","q":"任務卡：有一位守衛負責『記住曾經遇過的敵人』。下次同樣敵人出現時，他能更快召集部隊。這位守衛最像哪種角色？","options":["記憶細胞","紅血球","血小板","嗜鹼性球"],"ans":"記憶細胞","exp":"題目考的是『再次遇到相同抗原時反應更快』這個概念。"},{"cat":"概念配對","q":"基地入口的防護罩、城牆與警戒網，最像人體哪一類防禦設計？","options":["第一線屏障","抗體記憶","移植排斥","腫瘤監視"],"ans":"第一線屏障","exp":"皮膚與黏膜可視為先阻擋外敵進入的第一線。"},{"cat":"概念配對","q":"補給站收到指令後，開始大量製造同一種武器。這個補給站最接近哪一類細胞功能？","options":["漿細胞","NK細胞","嗜中性球","調節型T細胞"],"ans":"漿細胞","exp":"漿細胞的重點是大量分泌抗體。"},{"cat":"概念配對","q":"某巡邏隊不需要先看敵人完整檔案，只要發現異常標記減少，就會直接攻擊。最接近哪種細胞？","options":["自然殺手細胞","B細胞","紅血球","肥大細胞"],"ans":"自然殺手細胞","exp":"NK細胞會注意異常細胞表面辨識訊號的改變。"},{"cat":"概念配對","q":"有一支部隊專門抑制過度攻擊，避免自己人互打。最接近哪種免疫角色？","options":["調節型T細胞","嗜中性球","漿細胞","嗜酸性球"],"ans":"調節型T細胞","exp":"重點在維持免疫平衡與自體耐受。"},{"cat":"概念判斷","q":"若一個系統能針對『特定目標』設計專用武器，這比較符合哪種免疫特性？","options":["專一性","物理性屏障","非專一性吞噬","發炎反應"],"ans":"專一性","exp":"專一性免疫會針對特定抗原產生對應反應。"},{"cat":"概念判斷","q":"某次演習後，部隊留下完整作戰紀錄，因此下一次反應速度更快。這最能說明哪個概念？","options":["免疫記憶","血型相容","發炎擴張","補體失活"],"ans":"免疫記憶","exp":"免疫記憶讓再次反應更快更強。"},{"cat":"概念判斷","q":"若防禦系統開始攻擊自己的正常設施，最可能代表哪一類失衡？","options":["自體免疫","被動免疫","正常發炎","血液凝固"],"ans":"自體免疫","exp":"自體免疫的核心是免疫系統誤攻擊自身。"},{"cat":"概念判斷","q":"若一個防禦蛋白本身不是抗體，卻能協助標記、發炎與破壞敵人，它最像哪個系統？","options":["補體系統","紅血球系統","凝血系統","內分泌系統"],"ans":"補體系統","exp":"補體能協助標記、發炎與攻擊病原。"},{"cat":"概念判斷","q":"感染區出現局部紅、腫、熱、痛，最適合歸類為哪種現象？","options":["發炎反應","被動免疫","記憶反應","移植耐受"],"ans":"發炎反應","exp":"紅、腫、熱、痛是典型局部發炎表現。"},{"cat":"機轉排序","q":"請選出較合理的故事順序：先發現敵人，再通報，再啟動專一性武器生產。","options":["辨識→呈現→活化→產生效應","活化→辨識→呈現→失活","產生效應→辨識→呈現→活化","呈現→失活→辨識→記憶消失"],"ans":"辨識→呈現→活化→產生效應","exp":"免疫反應通常從辨識與呈現開始，再進入活化與效應階段。"},{"cat":"機轉排序","q":"某種過敏故事中，第一次接觸建立敏感狀態，第二次再接觸才快速出現症狀。這種流程的關鍵是？","options":["先致敏，再觸發反應","先溶血，再形成抗體","先移植，再建立耐受","先感染，再失去所有細胞"],"ans":"先致敏，再觸發反應","exp":"很多過敏反應需要先建立致敏狀態。"},{"cat":"機轉排序","q":"防禦單位把敵人片段展示在表面，再交給指揮官判讀。這段描述最接近？","options":["抗原呈現","抗體沉澱","血型凝集","補體失活"],"ans":"抗原呈現","exp":"重點是將抗原片段展示給T細胞辨識。"},{"cat":"機轉排序","q":"若要完成『標記敵人→吸引支援→破壞目標』，最適合聯想到哪一組合作？","options":["抗體與補體","紅血球與血小板","胰島素與肝醣","膽汁與消化酵素"],"ans":"抗體與補體","exp":"抗體可辨識，補體可協助標記與破壞。"},{"cat":"機轉排序","q":"一場免疫作戰結束後，仍留下少數精銳部隊，下一次能快速反應。最後留下的是？","options":["記憶細胞","成熟紅血球","血小板","嗜中性球殘骸"],"ans":"記憶細胞","exp":"記憶細胞讓下一次反應更有效率。"},{"cat":"找出問題","q":"哪個敘述最需要修正？","options":["所有免疫反應都只靠抗體完成","有些免疫反應由細胞直接參與","先天免疫反應較快","後天免疫具有記憶"],"ans":"所有免疫反應都只靠抗體完成","exp":"細胞性免疫並不只靠抗體。"},{"cat":"找出問題","q":"哪個角色分配最不合理？","options":["紅血球負責抗原呈現","樹突細胞負責通報抗原","漿細胞負責製造抗體","NK細胞負責攻擊異常細胞"],"ans":"紅血球負責抗原呈現","exp":"紅血球不是主要抗原呈現細胞。"},{"cat":"找出問題","q":"哪個說法最不恰當？","options":["所有過敏反應都一定立即發生","有些過敏反應屬延遲型","過敏可能涉及抗體","過敏也可能涉及T細胞"],"ans":"所有過敏反應都一定立即發生","exp":"過敏反應並非全部都是立即型。"},{"cat":"找出問題","q":"哪個配對最有問題？","options":["記憶細胞—快速再反應","漿細胞—大量製造抗體","調節型T細胞—抑制過度反應","血小板—建立抗原記憶"],"ans":"血小板—建立抗原記憶","exp":"血小板不負責建立免疫記憶。"},{"cat":"找出問題","q":"哪個敘述最需要修正？","options":["補體就是一種抗體","補體可參與標記病原","補體可促進發炎","補體可協助破壞目標"],"ans":"補體就是一種抗體","exp":"補體是蛋白系統，不等同抗體。"},{"cat":"情境推理","q":"病人接觸某物後立刻出現全身性不適，重點應先放在哪一種生理危機？","options":["呼吸與循環是否受影響","是否需要補充鐵質","是否有骨折","是否有近視"],"ans":"呼吸與循環是否受影響","exp":"立即型嚴重過敏應先評估呼吸與循環。"},{"cat":"情境推理","q":"兩個人接受相同疫苗，但其中一人之後再遇到同一病原時反應較快。最合理的解釋是？","options":["已建立免疫記憶","紅血球數量增加","血型發生改變","補體完全消失"],"ans":"已建立免疫記憶","exp":"疫苗的重要目標之一是建立記憶。"},{"cat":"情境推理","q":"某病人因免疫功能長期受損，開始反覆出現平常不常見的感染。這比較符合哪個方向？","options":["免疫缺乏","單純發炎","血型不合","凝血異常"],"ans":"免疫缺乏","exp":"免疫缺乏會提高反覆或特殊感染風險。"},{"cat":"情境推理","q":"移植後，受贈者的防禦系統把新器官當成外來目標。這種現象最接近？","options":["移植排斥","主動免疫","正常發炎","血小板凝集"],"ans":"移植排斥","exp":"移植排斥是對外來組織辨識後的免疫反應。"},{"cat":"情境推理","q":"某腫瘤細胞降低表面辨識訊號，讓防禦部隊較難發現。這最像哪種策略？","options":["免疫逃脫","抗體中和","發炎放大","被動免疫"],"ans":"免疫逃脫","exp":"腫瘤可透過降低辨識訊號來逃避免疫。"},{"cat":"角色任務","q":"守門員負責把敵人擋在城外，不讓敵人進入。這個角色最像？","options":["皮膚與黏膜","記憶細胞","漿細胞","毒殺型T細胞"],"ans":"皮膚與黏膜","exp":"它們是最前線的物理與化學屏障。"},{"cat":"角色任務","q":"情報官先吞進敵人，再把敵人特徵展示給指揮部。這個角色最像？","options":["抗原呈現細胞","紅血球","血小板","肥大細胞"],"ans":"抗原呈現細胞","exp":"重點在攝取並展示抗原片段。"},{"cat":"角色任務","q":"狙擊手專門直接清除被感染或異常的目標。這個角色最像？","options":["毒殺型T細胞","漿細胞","紅血球","B細胞"],"ans":"毒殺型T細胞","exp":"毒殺型T細胞能直接攻擊特定異常細胞。"},{"cat":"角色任務","q":"警報器一啟動，就讓周圍區域進入防禦狀態。這最像哪類訊號分子？" let pool=[],index=0,current=null,hp=3,streak=0,score=0,enemyHp=100;const $=id=>document.getElementById(id);
function setupCategories(){[...new Set(questions.map(q=>q.cat))].forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;$('category').appendChild(o)})}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function update(){$('hp').textContent=hp;$('streak').textContent=streak;$('score').textContent=score;$('enemyHp').style.width=enemyHp+'%'}
function animateHit(ok){if(ok){$('hero').classList.add('attack');$('monster').classList.add('hit')}else{$('monster').classList.add('attack');$('hero').classList.add('hit')}$('flash').classList.add('on');setTimeout(()=>{$('hero').classList.remove('attack','hit');$('monster').classList.remove('attack','hit');$('flash').classList.remove('on')},380)}
function startGame(){const cat=$('category').value;pool=questions.filter(q=>cat==='全部'||q.cat===cat);shuffle(pool);index=0;hp=3;streak=0;score=0;enemyHp=100;update();$('catLabel').textContent=cat==='全部'?'全部題型':cat;$('status').textContent='戰鬥開始';nextQuestion()}
function nextQuestion(){if(!pool.length){startGame();return}if(index>=pool.length||hp<=0||enemyHp<=0){$('question').textContent=enemyHp<=0?'Boss 已擊敗！':hp<=0?'挑戰失敗':'闖關完成';$('options').innerHTML='';$('progress').textContent='完成';return}current=pool[index++];$('progress').textContent=`第 ${index} 題 / 共 ${pool.length} 題`;$('question').textContent=current.q;$('answer').style.display='none';$('answer').innerHTML=`<b>概念提示：</b>${current.exp}`;const box=$('options');box.innerHTML='';shuffle([...current.options]).forEach(opt=>{const b=document.createElement('button');b.className='option';b.textContent=opt;b.onclick=()=>choose(b,opt);box.appendChild(b)})}
function choose(el,opt){document.querySelectorAll('.option').forEach(x=>x.disabled=true);if(opt===current.ans){el.classList.add('correct');streak++;score+=10;enemyHp=Math.max(0,enemyHp-(streak>=3?18:12));$('status').textContent='攻擊成功！';animateHit(true)}else{el.classList.add('wrong');streak=0;hp--;enemyHp=Math.min(100,enemyHp+5);$('status').textContent='Boss 反擊！';document.querySelectorAll('.option').forEach(x=>{if(x.textContent===current.ans)x.classList.add('correct')});animateHit(false)}update();$('answer').style.display='block'}
$('startBtn').onclick=startGame;$('nextBtn').onclick=nextQuestion;$('answerBtn').onclick=()=>{if(current)$('answer').style.display='block'};setupCategories();update();
</script>
</body>
</html>
