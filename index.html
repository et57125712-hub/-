.bossTalk{position:absolute;right:18px;top:78px;max-width:58%;background:#fff;color:#15151c;border:3px solid #222;border-radius:16px;padding:10px 12px;font-weight:900;z-index:20;opacity:0;transform:translateY(-8px) scale(.92);transition:.22s;box-shadow:5px 5px 0 rgba(0,0,0,.25)}.bossTalk:after{content:"";position:absolute;right:28px;bottom:-14px;border:8px solid transparent;border-top-color:#222}.bossTalk:before{content:"";position:absolute;right:30px;bottom:-10px;border:7px solid transparent;border-top-color:#fff;z-index:2}.bossTalk.show{opacity:1;transform:translateY(0) scale(1)}
.syringe{position:absolute;left:100px;bottom:105px;font-size:38px;opacity:0;z-index:8}.syringe.on{animation:syringeFly .75s ease-out}.syringe.double{font-size:48px}.syringe.beam{font-size:64px;filter:drop-shadow(0 0 18px #fff)}@keyframes syringeFly{0%{opacity:0;transform:translateX(0) rotate(-20deg) scale(.6)}12%{opacity:1}70%{opacity:1}100%{opacity:0;transform:translateX(370px) translateY(-30px) rotate(25deg) scale(1.45)}}

.stageBadge{position:absolute;top:72px;left:12px;background:rgba(0,0,0,.66);color:#fff;border-radius:999px;padding:5px 9px;font-size:.78rem;font-weight:900;z-index:8}
.hud{display:flex;justify-content:space-between;margin-top:8px;color:var(--muted)}.hud b{color:var(--cyan)}.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:.86rem;font-weight:800}.question{margin-top:10px;padding:16px;border-radius:14px;background:#0f0418;border-left:4px solid var(--cyan);font-size:1.14rem;line-height:1.5;font-weight:850;min-height:120px}.options{display:grid;gap:9px;margin-top:10px}.option{background:#150621;color:#fff;border:1px solid rgba(53,242,255,.3);text-align:left}.option.correct{border-color:var(--lime);background:rgba(156,255,87,.12)}.option.wrong{border-color:var(--danger);background:rgba(255,72,106,.12)}.answer{display:none;margin-top:10px;padding:12px;border-radius:12px;background:#211408;border:1px solid rgba(255,216,77,.35);line-height:1.6}.source{margin-top:8px;padding-top:8px;border-top:1px dashed rgba(255,216,77,.35);font-size:.88rem;color:#ffe598}.status{min-height:1.2em;margin-top:8px;color:var(--lime);font-weight:850}

a-inset-bottom))}.bottom button{padding:9px;font-size:.88rem}@keyframes syringeFly{0%{opacity:0;transform:translateX(0) rotate(-20deg) scale(.6)}12%{opacity:1}70%{opacity:1}100%{opacity:0;transform:translateX(220px) translateY(-14px) rotate(25deg) scale(1.35)}}}
</style>

<body>
<header><h1>免疫守衛戰</h1><p>國考特訓20題・基礎概念50題・綜合挑戰70題</p></header>
<main>
<section class="card">
<div class="setup"><select id="gameMode"><option value="all" selected>綜合挑戰（70題）</option><option value="national">國考特訓（20題）</option><option value="concept">概念闖關（50題）</option></select><button id="startBtn" type="button">開始戰鬥</button></div>
<div id="battle" class="battle"><div id="speedlines" class="speedlines"></div><div class="platform left"></div><div class="platform right"></div><div class="statusbox enemy"><div class="nameRow"><span id="bossName">免疫病毒</span><span>Lv.<span id="bossLv">10</span></span></div><div class="miniHp"><span id="enemyHp"></span></div></div><div class="statusbox heroBox"><div class="nameRow"><span id="heroName">護生守衛</span><span>Lv.<span id="heroLv">1</span></span></div><div class="miniHp"><span id="heroHpBar"></span></div></div><div id="stageBadge" class="stageBadge">STAGE 1 / 5</div><div id="aura" class="aura"></div><div id="heroBurst" class="heroBurst"></div><div id="hero" class="hero">🧑‍⚕️</div><div id="equip" class="equip">🛡️</div><div id="monster" class="monster">🦠</div><div id="syringe" class="syringe">💉</div><div id="damage" class="damage">-10</div><div id="battleText" class="battleText"></div><div id="bossTalk" class="bossTalk">你們的免疫力，跟考前讀書進度一樣薄弱。</div><div id="evolutionBanner" class="evolutionBanner">連勝進化！</div><div id="bossIntro" class="bossIntro">BOSS BATTLE</div><div id="transformFlash" class="transformFlash"></div><div id="bossFlash" class="bossFlash"></div></div>
<div class="hud"><span>生命 <b id="hp">7</b></span><span>連勝 <b id="streak">0</b></span><span>分數 <b id="score">0</b></span></div><div id="status" class="status"></div>
</section>
<section class="card"><div class="meta"><span id="progress">尚未開始</span><span id="catLabel">綜合挑戰</span></div><div id="question" class="question">選擇模式後按下「開始戰鬥」。</div><div id="options" class="options"></div><div id="answer" class="answer"></div></section>
</main>
<div class="bottom"><div class="bar"><button id="answerBtn" type="button" class="secondary">查看解析</button><button id="nextBtn" type="button">下一題</button></div></div>
<script>
(function(){

{q:'過敏性休克時最可能出現哪一項血管變化？',options:['小動脈擴張','微血管通透性下降','心輸出量一定上升','血管全面收縮'],ans:'小動脈擴張',exp:'過敏性休克可造成全身性血管擴張與通透性增加。',src:'112年第2次護理師國考－基礎醫學，第16題；本題已重新改寫。'},
{q:'重症肌無力與哪一種神經傳導物質相關？',options:['乙醯膽鹼','血清素','組織胺','腎上腺素'],ans:'乙醯膽鹼',exp:'重症肌無力與乙醯膽鹼受體相關自體抗體有關。',src:'112年第2次護理師國考－基礎醫學，第12題；本題已重新改寫。'},

{open:['你們的免疫力，跟考前讀書進度一樣薄弱。','歡迎來到期末地獄，我是你們的未完成進度。'],wrong:['這題都不會？我都快產生抗藥性了。','記憶細胞今天請假嗎？','答錯得很有創意，可惜免疫系統不收創意分。'],transform:['別緊張，我只是從小考進化成期末考。','你以為我在變身？不，我只是在加重配分。'],low:['我這不是快不行，這叫發炎反應。','剩一點血而已，跟你們考前睡眠差不多。'],defeat:['等一下，我還有最後一個變異株……啊，沒了。','你贏了，但你的肝還在熬夜。']},
{open:['我是耐藥細菌，最怕的不是抗生素，是你突然會讀書。'],wrong:['選錯了，這抗生素連我的心都感動不了。','你這答案，比亂吃抗生素還危險。'],transform:['耐藥性升級，跟你拖延症一樣頑強。'],low:['快沒血？我只是進入菌落計數困難。'],defeat:['輸了，但我至少沒有亂用抗生素。']},

let pool=[],index=0,current=null,hp=7,streak=0,score=0,enemyHp=130,stage=1,maxHp=130,heroForm=0,bossForm=1,locked=false,talkTimer=null,lastLowTalkStage=0,autoNextTimer=null;
const $=function(id){return document.getElementById(id)};
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=arr[i];arr[i]=arr[j];arr[j]=t}return arr}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function showText(t){$('battleText').textContent=t;$('battleText').classList.add('show');setTimeout(function(){$('battleText').classList.remove('show')},1100)}
function bossSay(type){const lines=bossLines[stage-1][type]||[];if(!lines.length)return;clearTimeout(talkTimer);const box=$('bossTalk');box.textContent=pick(lines);box.classList.add('show');talkTimer=setTimeout(function(){box.classList.remove('show')},3600)}
function flashHero(){const f=$('transformFlash');const b=$('heroBurst');f.classList.add('on');b.classList.add('on');$('battle').classList.add('shake');setTimeout(function(){f.classList.remove('on');b.classList.remove('on');$('battle').classList.remove('shake')},1200)}
function showEvolution(name){const banner=$('evolutionBanner');banner.textContent='🔥 連勝進化｜'+name+' 🔥';banner.classList.remove('show');void banner.offsetWidth;banner.classList.add('show');setTimeout(function(){banner.classList.remove('show')},1450)}
function getHeroState(){let state=heroStates[0];heroStates.forEach(function(s){if(streak>=s.min)state=s});if(streak>=12){const ult=[{min:12,name:'IgG光束使',icon:'🦸',equip:'🧬✨',cls:'form8',aura:'on gold',skill:'IgG光束',projectile:'🧬'},{min:12,name:'NK終結者',icon:'🥷',equip:'⚔️🌙',cls:'form8',aura:'on pink',skill:'NK斬擊',projectile:'⚔️'},{min:12,name:'MAC破城者',icon:'🧙‍♂️',equip:'⭕💥',cls:'form8',aura:'on green',skill:'MAC終結技',projectile:'💥'}];state=ult[Math.floor((streak-12)%ult.length)]}return state}
function applyHeroState(force){const s=getHeroState();const rank=streak>=12?99:heroStates.findIndex(function(x){return x.min===s.min});if(!force&&rank===heroForm)return;heroForm=rank;const hero=$('hero');hero.className='hero'+(s.cls?' '+s.cls:'')+' transforming';hero.textContent=s.icon;$('heroName').textContent=s.name;const equip=$('equip');equip.textContent=s.equip;equip.className='equip'+(s.equip?' show':'')+(streak>=10?' ultimate':streak>=5?' big':'');$('aura').className='aura'+(s.aura?' '+s.aura:'');$('syringe').textContent=s.projectile;$('syringe').className='syringe'+(streak>=10?' beam':streak>=2?' double':'');$('battle').classList.toggle('ultimate',streak>=10);if(streak>0){flashHero();showEvolution(s.name)}setTimeout(function(){hero.classList.remove('transforming')},1100)}
function resetHero(){heroForm=-1;streak=0;$('battle').classList.remove('ultimate');applyHeroState(true)}
function applyBossForm(form){if(form===bossForm)return;bossForm=form;const data=stages[stage-1].forms[form-1];$('monster').classList.remove('form2','form3','form4','transforming');void $('monster').offsetWidth;$('monster').classList.add('transforming');if(form>1)$('monster').classList.add('form'+form);$('monster').textContent=data[1];$('bossName').textContent=data[0];$('bossFlash').classList.add('on');setTimeout(function(){$('bossFlash').classList.remove('on');$('monster').classList.remove('transforming')},1000);if(form===2){showText('Boss 發生突變！')}else if(form===3){$('battle').classList.add('rage');showText('Boss 進入狂暴型態！')}else if(form===4){$('battle').classList.add('rage');showText('危急！Boss 解放終極型態！')}bossSay('transform')}
function updateBossForm(){const ratio=enemyHp/maxHp;if(ratio<=.1)applyBossForm(4);else if(ratio<=.35)applyBossForm(3);else if(ratio<=.7)applyBossForm(2);else applyBossForm(1);if(ratio<=.2&&enemyHp>0&&lastLowTalkStage!==stage){lastLowTalkStage=stage;bossSay('low')}}
function update(){hp=Math.max(0,hp);$('hp').textContent=String(hp);$('streak').textContent=String(streak);$('score').textContent=String(score);$('enemyHp').style.width=Math.max(0,enemyHp/maxHp*100)+'%';$('heroHpBar').style.width=Math.max(0,hp/7*100)+'%';$('heroLv').textContent=String(1+Math.floor(score/100));applyHeroState(false);updateBossForm()}
function loadStage(n){stage=n;lastLowTalkStage=0;const s=stages[n-1];enemyHp=s.hp;maxHp=s.hp;bossForm=1;$('battle').className='battle'+(n>1?' stage'+n:'')+(streak>=10?' ultimate':'');$('monster').className='monster';$('monster').textContent=s.forms[0][1];$('bossName').textContent=s.forms[0][0];$('bossLv').textContent=String(s.lv);$('stageBadge').textContent='STAGE '+n+' / 5';$('bossIntro').innerHTML='STAGE '+n+'<br><span style="font-size:1rem">'+s.name+'</span>';$('bossIntro').classList.add('show');setTimeout(function(){$('bossIntro').classList.remove('show')},1200);showText(s.name+' 出現了！');update();setTimeout(function(){bossSay('open')},1400)}
function animateAttack(ok,dmg){if(ok){$('hero').classList.add('throw');$('monster').classList.add('hit');$('syringe').classList.add('on');$('damage').textContent='-'+dmg;$('damage').classList.add('on');$('speedlines').classList.add('on');if(streak>=10){$('battle').classList.add('shake')}}else{$('hero').classList.add('hit');$('speedlines').classList.add('on');$('battle').classList.add('shake')}setTimeout(function(){$('hero').classList.remove('throw','hit');$('monster').classList.remove('hit');$('syringe').classList.remove('on');$('damage').classList.remove('on');$('speedlines').classList.remove('on');$('battle').classList.remove('shake')},800)}
function scheduleNext(ms){clearTimeout(autoNextTimer);autoNextTimer=setTimeout(function(){if(!locked&&hp>0&&index<pool.length){nextQuestion()}},ms)}
function startGame(){clearTimeout(autoNextTimer);const mode=$('gameMode').value;pool=mode==='national'?national.slice():mode==='concept'?concept.slice():national.concat(concept);shuffle(pool);index=0;current=null;hp=7;streak=0;score=0;locked=false;heroForm=-1;applyHeroState(true);loadStage(1);$('catLabel').textContent=mode==='national'?'國考特訓':mode==='concept'?'概念闖關':'綜合挑戰';$('status').textContent='開始，共 '+pool.length+' 題';nextQuestion()}
function nextQuestion(){clearTimeout(autoNextTimer);if(!pool.length){$('status').textContent='請先按開始戰鬥';return}if(locked)return;if(hp<=0){$('question').textContent='挑戰失敗';$('options').innerHTML='';return}if(index>=pool.length){$('question').textContent='本輪完成';$('options').innerHTML='';return}current=pool[index++];$('progress').textContent='第 '+index+' 題 / 共 '+pool.length+' 題';$('question').textContent=current.q;$('answer').style.display='none';$('answer').innerHTML='<b>解析：</b>'+current.exp+'<div class="source">'+current.src+'</div>';const box=$('options');box.innerHTML='';shuffle(current.options.slice()).forEach(function(opt){const b=document.createElement('button');b.type='button';b.className='option';b.textContent=opt;b.addEventListener('click',function(){choose(b,opt)});box.appendChild(b)})}
function showAnswer(){if(current)$('answer').style.display='block'}
function choose(el,opt){if(locked||!current)return;clearTimeout(autoNextTimer);locked=true;Array.from(document.querySelectorAll('.option')).forEach(function(b){b.disabled=true});if(opt===current.ans){el.classList.add('correct');streak++;const base=streak>=12?26:streak>=10?23:streak>=8?20:streak>=6?18:streak>=5?17:streak>=4?15:streak>=3?14:streak>=2?12:10;const dmg=Math.max(6,Math.round(base*(1-(stage-1)*.08)));enemyHp=Math.max(0,enemyHp-dmg);score+=base;update();const skill=getHeroState().skill;showText($('heroName').textContent+'使出「'+skill+'」！');animateAttack(true,dmg);if(enemyHp<=0){bossSay('defeat');setTimeout(function(){if(stage<5){loadStage(stage+1);locked=false;nextQuestion()}else{$('question').textContent='全部關卡突破！';$('options').innerHTML='';$('progress').textContent='FINAL CLEAR';showText('FINAL CLEAR！')}},1500)}else{locked=false;scheduleNext(1500)}}else{el.classList.add('wrong');resetHero();const bossDmg=Math.min(3,1+Math.floor((stage-1)/2));hp-=bossDmg;showText(stages[stage-1].forms[bossForm-1][0]+' 發動反擊！');bossSay('wrong');animateAttack(false,0);Array.from(document.querySelectorAll('.option')).forEach(function(b){if(b.textContent===current.ans)b.classList.add('correct')});update();locked=false;if(hp>0){scheduleNext(2400)}}$('answer').style.display='block';if(window.innerWidth<=520){$('battle').scrollIntoView({behavior:'smooth',block:'center'});setTimeout(function(){$('question').scrollIntoView({behavior:'smooth',block:'center'})},900)}}
window.addEventListener('DOMContentLoaded',function(){$('startBtn').addEventListener('click',startGame);$('nextBtn').addEventListener('click',nextQuestion);$('answerBtn').addEventListener('click',showAnswer);update()});
